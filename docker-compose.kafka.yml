services:
  kafka-local:
    image: confluentinc/cp-kafka:7.5.2
    container_name: kafka-local
    hostname: kafka-local
    ports:
      - "9092:9092"
    environment:
      CLUSTER_ID: "4L6g3nShT-eMCtK--X86sw"
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "BROKER://kafka-local:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://kafka-local:29093"
      KAFKA_ADVERTISED_LISTENERS: "BROKER://kafka-local:29092,EXTERNAL://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "BROKER:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "BROKER"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka-local:29093"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_BROKER_HEARTBEAT_INTERVAL_MS: "3000"
      KAFKA_BROKER_SESSION_TIMEOUT_MS: "60000"
      KAFKA_CONTROLLER_QUORUM_REQUEST_TIMEOUT_MS: "30000"
      KAFKA_CONTROLLER_QUORUM_RETRY_BACKOFF_MS: "100"
      KAFKA_INITIAL_BROKER_REGISTRATION_TIMEOUT_MS: "120000"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

