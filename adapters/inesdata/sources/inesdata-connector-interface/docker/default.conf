server {
    listen       8080;
    server_name  _;
    absolute_redirect off;


    root   /usr/share/nginx/html;

    sendfile on;
    default_type application/octet-stream;
    gzip on;
    gzip_http_version 1.1;
    gzip_disable "MSIE [1-6]\.";
    gzip_min_length 256;
    gzip_vary on;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss text/ja$
    gzip_comp_level 9;
    add_header Strict-Transport-Security "max-age=7884000";

    client_max_body_size 20M;

    # Avoid 403 on direct SPA deep-link /assets, which collides with the
    # static /assets directory in the built Angular bundle.
    location = /inesdata-connector-interface/assets {
        try_files /inesdata-connector-interface/index.html =404;
    }

    location = /inesdata-connector-interface/assets/ {
        try_files /inesdata-connector-interface/index.html =404;
    }

    location = /inesdata-connector-interface/model-observer {
        return 301 /inesdata-connector-interface/model-observer/;
    }

    location /inesdata-connector-interface/model-observer/ {
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass ${MODEL_OBSERVER_PROXY_TARGET}/api/model-observer/;
    }

    location /inesdata-connector-interface {
        try_files $uri $uri/ /index.html;
    }

    error_page 404 /index.html;
    location = /index.html {
        root  /usr/share/nginx/html/inesdata-connector-interface;
        internal;
    }
}
