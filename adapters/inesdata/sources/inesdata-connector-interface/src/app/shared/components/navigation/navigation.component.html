<div class="navigation-container">
  <mat-sidenav-container class="sidenav-container">
    <mat-sidenav
      #drawer
      class="sidenav"
      fixedInViewport
      [attr.role]="(isHandset$ | async) ? 'dialog' : 'navigation'"
      [mode]="(isHandset$ | async) ? 'over' : 'side'"
      [opened]="(isHandset$ | async) === false"
    >
      <mat-toolbar class="sidenav-toolbar">
        <span class="brand-label">
          <img class="brand-logo" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRFx74NOUEbxFdi28N-A1OZaIJvFpgyWq20lg&s" alt="STICS logo">
        </span>
      </mat-toolbar>
      <mat-nav-list>
        <ng-container *ngFor="let route of routes">
          <a
            mat-list-item
            *ngIf="route.data?.title"
            [routerLink]="[route.path]"
            routerLinkActive="is-active"
            [routerLinkActiveOptions]="{ exact: false }"
          >
            <mat-icon matListItemIcon>{{ route.data?.icon }}</mat-icon>
            <span class="nav-label">{{ route.data?.title ?? route.path }}</span>
          </a>
        </ng-container>
      </mat-nav-list>
    </mat-sidenav>
    <mat-sidenav-content>
      <mat-toolbar class="app-toolbar">
        <button
          type="button"
          aria-label="Toggle sidenav"
          mat-icon-button
          (click)="drawer.toggle()"
          *ngIf="isHandset$ | async"
        >
          <mat-icon aria-label="Side nav toggle icon">menu</mat-icon>
        </button>
        <span>{{ titleService.getTitle() }}</span>
        <div class="logout">
          <span (click)="logout()">
            <mat-icon aria-label="Side nav toggle icon">logout</mat-icon>
            <div>Log out</div>
          </span>
        </div>
      </mat-toolbar>
      <div class="scrollable-content">
        <main class="page-content">
          <router-outlet></router-outlet>
        </main>
        <app-footer class="footer-content"></app-footer>
      </div>
    </mat-sidenav-content>
  </mat-sidenav-container>
  <app-spinner></app-spinner>
</div>
