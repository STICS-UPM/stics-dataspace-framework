server {
  listen 80;
  root /usr/share/nginx/html;

  location = / {
    return 302 /edc-dashboard/;
  }

  location /edc-dashboard/config/ {
    alias /usr/share/nginx/html/edc-dashboard/config/;
    try_files $uri$args $uri$args/ =404;
  }

  location /edc-dashboard/ {
    alias /usr/share/nginx/html/edc-dashboard/;
    index index.html;
    try_files $uri$args $uri$args/ /edc-dashboard/index.html;
  }
}
