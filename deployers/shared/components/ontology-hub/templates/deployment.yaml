{{- $healthProbeType := default "tcp" .Values.health.probeType }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ontology-hub.fullname" . }}
  labels:
    {{- include "ontology-hub.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "ontology-hub.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "ontology-hub.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.hostAliases }}
      hostAliases:
      {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        {{- if .Values.mongodb.enabled }}
        - name: wait-mongodb
          image: {{ .Values.mongodb.image.repository }}:{{ .Values.mongodb.image.tag }}
          imagePullPolicy: {{ .Values.mongodb.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              until mongosh --host {{ .Values.mongodb.serviceName | default "mongodb" }} --eval "db.adminCommand('ping')" >/dev/null 2>&1; do
                echo "Waiting for MongoDB..."
                sleep 2
              done
        {{- end }}
        {{- if .Values.elasticsearch.enabled }}
        - name: wait-elasticsearch
          image: curlimages/curl:8.7.1
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              ES_URL="http://{{ .Values.elasticsearch.serviceName | default "elasticsearch" }}:{{ .Values.elasticsearch.port | default 9200 }}"
              until code="$(curl -sS -o /dev/null -w '%{http_code}' "$ES_URL" || true)"; [ "$code" = "200" ] || [ "$code" = "401" ]; do
                echo "Waiting for Elasticsearch... (HTTP $code)"
                sleep 2
              done
        {{- end }}
      containers:
        - name: {{ include "ontology-hub.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          {{- $hasIngressHost := and .Values.ingress.enabled (ne (.Values.ingress.host | default "") "") }}
          env:
            - name: PORT
              value: {{ .Values.service.port | quote }}
            - name: NODE_ENV
              value: {{ default "development" (index .Values.env "NODE_ENV") | quote }}
            - name: SELF_HOST_URL
              value: {{ default (ternary (printf "http://%s" .Values.ingress.host) (printf "http://localhost:%d" (.Values.service.port | int)) $hasIngressHost) (index .Values.env "SELF_HOST_URL") | quote }}
            - name: MONGO_DB_CONNECTION_URI
              value: {{ default (printf "mongodb://%s:%d" (.Values.mongodb.serviceName | default "mongodb") (.Values.mongodb.port | default 27017 | int)) (index .Values.env "MONGO_DB_CONNECTION_URI") | quote }}
            - name: MONGO_DB_CONNECTION_STRING
              value: {{ default (printf "mongodb://%s:%d/lov" (.Values.mongodb.serviceName | default "mongodb") (.Values.mongodb.port | default 27017 | int)) (index .Values.env "MONGO_DB_CONNECTION_STRING") | quote }}
            - name: ELASTIC_SEARCH_HOST
              value: {{ default (.Values.elasticsearch.serviceName | default "elasticsearch") (index .Values.env "ELASTIC_SEARCH_HOST") | quote }}
            - name: ELASTIC_SEARCH_USER
              value: {{ default (.Values.elasticsearch.auth.username | default "elastic") (index .Values.env "ELASTIC_SEARCH_USER") | quote }}
            {{- if or .Values.secrets.existingSecretName .Values.elasticsearch.auth.password (gt (len .Values.secrets.values) 0) }}
            - name: ELASTIC_SEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ontology-hub.secretName" . }}
                  key: ELASTIC_SEARCH_PASSWORD
            {{- end }}
            - name: SCRIPTS_PATH
              value: {{ default "/app/scripts" (index .Values.env "SCRIPTS_PATH") | quote }}
            - name: PATTERN_PATHS
              value: {{ default "/app/Patterns/Patrones" (index .Values.env "PATTERN_PATHS") | quote }}
            - name: PYTHON_PATTERNS_PATH
              value: {{ default "python" (index .Values.env "PYTHON_PATTERNS_PATH") | quote }}
            {{- $reserved := dict "PORT" true "NODE_ENV" true "SELF_HOST_URL" true "MONGO_DB_CONNECTION_URI" true "MONGO_DB_CONNECTION_STRING" true "ELASTIC_SEARCH_HOST" true "ELASTIC_SEARCH_USER" true "ELASTIC_SEARCH_PASSWORD" true "SCRIPTS_PATH" true "PATTERN_PATHS" true "PYTHON_PATTERNS_PATH" true }}
            {{- range $key, $val := .Values.env }}
            {{- if not (hasKey $reserved $key) }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            {{- end }}
            {{- if and .Values.secrets.existingSecretName (gt (len .Values.secretEnvKeys) 0) }}
            {{- range $k := .Values.secretEnvKeys }}
            - name: {{ $k }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.secrets.existingSecretName }}
                  key: {{ $k }}
            {{- end }}
            {{- end }}
          {{- if .Values.health.startupProbe.enabled }}
          startupProbe:
            {{- if eq $healthProbeType "tcp" }}
            tcpSocket:
              port: http
            {{- else }}
            httpGet:
              path: {{ .Values.health.path | quote }}
              port: http
            {{- end }}
            initialDelaySeconds: {{ .Values.health.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.health.startupProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.health.startupProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.health.startupProbe.failureThreshold }}
          {{- end }}
          livenessProbe:
            {{- if eq $healthProbeType "tcp" }}
            tcpSocket:
              port: http
            {{- else }}
            httpGet:
              path: {{ .Values.health.path | quote }}
              port: http
            {{- end }}
            initialDelaySeconds: {{ .Values.health.initialDelaySeconds }}
            periodSeconds: {{ .Values.health.periodSeconds }}
            timeoutSeconds: {{ .Values.health.timeoutSeconds }}
          readinessProbe:
            {{- if eq $healthProbeType "tcp" }}
            tcpSocket:
              port: http
            {{- else }}
            httpGet:
              path: {{ .Values.health.path | quote }}
              port: http
            {{- end }}
            initialDelaySeconds: {{ .Values.health.initialDelaySeconds }}
            periodSeconds: {{ .Values.health.periodSeconds }}
            timeoutSeconds: {{ .Values.health.timeoutSeconds }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: versions
              mountPath: {{ .Values.versions.mountPath | default "/app/versions" | quote }}
      volumes:
        - name: versions
          {{- if .Values.versions.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "ontology-hub.fullname" . }}-versions
          {{- else }}
          emptyDir: {}
          {{- end }}
