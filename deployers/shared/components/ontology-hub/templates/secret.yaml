{{- if not .Values.secrets.existingSecretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ontology-hub.secretName" . }}
  labels:
    {{- include "ontology-hub.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.elasticsearch.auth.password }}
  ELASTIC_SEARCH_PASSWORD: {{ .Values.elasticsearch.auth.password | quote }}
  {{- end }}
  {{- range $k, $v := .Values.secrets.values }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
