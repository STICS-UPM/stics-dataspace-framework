apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ai-model-hub.fullname" . }}-config
  labels:
    {{- include "ai-model-hub.labels" . | nindent 4 }}
data:
  app-config.json: |-
    {{- .Values.config.appConfig | toJson | nindent 4 }}
  edc-connector-config.json: |-
    {{- .Values.config.edcConnectorConfig | toJson | nindent 4 }}
