apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "semantic-virtualization.fullname" . }}
  labels:
    {{- include "semantic-virtualization.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "semantic-virtualization.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "semantic-virtualization.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: {{ include "semantic-virtualization.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.service.port | quote }}
            {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          {{- if .Values.health.startupProbe.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.health.path | quote }}
              port: http
            initialDelaySeconds: {{ .Values.health.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.health.startupProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.health.startupProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.health.startupProbe.failureThreshold }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.health.path | quote }}
              port: http
            initialDelaySeconds: {{ .Values.health.initialDelaySeconds }}
            periodSeconds: {{ .Values.health.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.health.path | quote }}
              port: http
            initialDelaySeconds: {{ .Values.health.initialDelaySeconds }}
            periodSeconds: {{ .Values.health.periodSeconds }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
