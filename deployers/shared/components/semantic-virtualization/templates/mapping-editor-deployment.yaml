{{- $mappingEditor := .Values.mappingEditor | default (dict) }}
{{- $image := $mappingEditor.image | default (dict) }}
{{- $service := $mappingEditor.service | default (dict) }}
{{- $defaultEnv := dict "STREAMLIT_BROWSER_GATHER_USAGE_STATS" "false" "STREAMLIT_SERVER_HEADLESS" "true" }}
{{- $env := $mappingEditor.env | default $defaultEnv }}
{{- $health := $mappingEditor.health | default (dict) }}
{{- $hostPortConfig := $mappingEditor.hostPort | default (dict) }}
{{- $startupProbe := $health.startupProbe | default (dict) }}
{{- $resources := $mappingEditor.resources | default (dict) }}
{{- $enabled := $mappingEditor.enabled | default false }}
{{- if $enabled }}
{{- $replicaCount := $mappingEditor.replicaCount | default 1 }}
{{- $imageRepository := $image.repository | default "mapping-editor" }}
{{- $imageTag := $image.tag | default "local" }}
{{- $imagePullPolicy := $image.pullPolicy | default "IfNotPresent" }}
{{- $containerPort := $mappingEditor.containerPort | default 8501 }}
{{- $hostPortEnabled := $hostPortConfig.enabled | default false }}
{{- $hostPort := $hostPortConfig.port | default "" }}
{{- $strategy := $mappingEditor.strategy | default (dict) }}
{{- $servicePort := $service.port | default 8501 }}
{{- $healthPath := $health.path | default "/_stcore/health" }}
{{- $healthInitialDelay := $health.initialDelaySeconds | default 30 }}
{{- $healthPeriod := $health.periodSeconds | default 10 }}
{{- $startupProbeEnabled := true }}
{{- if hasKey $startupProbe "enabled" }}
{{- $startupProbeEnabled = $startupProbe.enabled }}
{{- end }}
{{- $startupInitialDelay := $startupProbe.initialDelaySeconds | default 10 }}
{{- $startupPeriod := $startupProbe.periodSeconds | default 10 }}
{{- $startupTimeout := $startupProbe.timeoutSeconds | default 2 }}
{{- $startupFailureThreshold := $startupProbe.failureThreshold | default 60 }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "semantic-virtualization.editorFullname" . }}
  labels:
    {{- include "semantic-virtualization.labels" . | nindent 4 }}
    app.kubernetes.io/component: mapping-editor
spec:
  {{- if $strategy }}
  strategy:
    {{- toYaml $strategy | nindent 4 }}
  {{- else if and $hostPortEnabled $hostPort }}
  strategy:
    type: Recreate
  {{- end }}
  replicas: {{ $replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "semantic-virtualization.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: mapping-editor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "semantic-virtualization.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: mapping-editor
    spec:
      containers:
        - name: mapping-editor
          image: "{{ $imageRepository }}:{{ $imageTag }}"
          imagePullPolicy: {{ $imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ $containerPort }}
              {{- if and $hostPortEnabled $hostPort }}
              hostPort: {{ $hostPort }}
              {{- end }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ $servicePort | quote }}
            {{- range $key, $val := $env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          {{- if $startupProbeEnabled }}
          startupProbe:
            httpGet:
              path: {{ $healthPath | quote }}
              port: http
            initialDelaySeconds: {{ $startupInitialDelay }}
            periodSeconds: {{ $startupPeriod }}
            timeoutSeconds: {{ $startupTimeout }}
            failureThreshold: {{ $startupFailureThreshold }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: {{ $healthPath | quote }}
              port: http
            initialDelaySeconds: {{ $healthInitialDelay }}
            periodSeconds: {{ $healthPeriod }}
          readinessProbe:
            httpGet:
              path: {{ $healthPath | quote }}
              port: http
            initialDelaySeconds: {{ $healthInitialDelay }}
            periodSeconds: {{ $healthPeriod }}
          resources:
            {{- toYaml $resources | nindent 12 }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
{{- end }}
