{{- $layout := .Values.connector.layout | default dict }}
{{- $ingress := .Values.connector.ingress | default dict }}
{{- $connectorPublicProtocol := (index $ingress "publicProtocol" | default (index $ingress "protocol") | default "http") }}
{{- $connectorPublicHostname := (index $ingress "publicHostname" | default (index $ingress "hostname")) }}
{{- $connectorPublicBase := printf "%s://%s" $connectorPublicProtocol $connectorPublicHostname }}
{{- $connectorIngressBase := printf "%s://%s" ((index $ingress "protocol") | default "http") (index $ingress "hostname") }}
{{- $keycloak := .Values.services.keycloak | default dict }}
{{- $keycloakPublicProtocol := (index $keycloak "publicProtocol" | default $connectorPublicProtocol | default (index $keycloak "protocol") | default "http") }}
{{- $connectorInterface := .Values.connectorInterface | default dict }}
{{- $connectorInterfacePublicBasePath := (trimSuffix "/" ((index $connectorInterface "publicBasePath") | default "/connector-interface")) }}
{{- $connectorInterfacePublicBaseHref := printf "%s/" $connectorInterfacePublicBasePath }}
{{- $modelObserver := .Values.connectorInterface.modelObserver | default dict }}
{{- $branding := .Values.connectorInterface.branding | default dict }}
{{- $brandingAssetBaseUrl := ((index $branding "assetBaseUrl") | default "") }}
{{- if or (not $brandingAssetBaseUrl) (and (ne $connectorInterfacePublicBasePath "/connector-interface") (eq (trimSuffix "/" $brandingAssetBaseUrl) "/connector-interface/assets/branding")) }}
{{- $brandingAssetBaseUrl = printf "%s/assets/branding" $connectorInterfacePublicBasePath }}
{{- end }}
{{- $brandingAssets := (index $branding "assets") | default list }}
{{- $brandingAssetsConfigMapName := (index $branding "assetsConfigMapName") | default "" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    service: {{ .Values.connector.name }}-interface
    {{- with (index $layout "role") }}
    validation-environment-role: {{ . | quote }}
    {{- end }}
    {{- with (index $layout "namespaceProfile") }}
    validation-environment-namespace-profile: {{ . | quote }}
    {{- end }}
  {{- if or (index $layout "runtimeNamespace") (index $layout "activeNamespace") (index $layout "plannedNamespace") (index $layout "registrationServiceNamespace") (index $layout "plannedRegistrationServiceNamespace") }}
  annotations:
    {{- with (index $layout "runtimeNamespace") }}
    validation-environment/runtime-namespace: {{ . | quote }}
    {{- end }}
    {{- with (index $layout "activeNamespace") }}
    validation-environment/active-namespace: {{ . | quote }}
    {{- end }}
    {{- with (index $layout "plannedNamespace") }}
    validation-environment/planned-namespace: {{ . | quote }}
    {{- end }}
    {{- with (index $layout "registrationServiceNamespace") }}
    validation-environment/registration-service-namespace: {{ . | quote }}
    {{- end }}
    {{- with (index $layout "plannedRegistrationServiceNamespace") }}
    validation-environment/planned-registration-service-namespace: {{ . | quote }}
    {{- end }}
  {{- end }}
  name: {{ .Values.connector.name }}-inteface
spec:
  replicas: 1
  selector:
    matchLabels:
      service: {{ .Values.connector.name }}-interface
  template:
    metadata:
      labels:
        service: {{ .Values.connector.name }}-interface
        {{- with (index $layout "role") }}
        validation-environment-role: {{ . | quote }}
        {{- end }}
        {{- with (index $layout "namespaceProfile") }}
        validation-environment-namespace-profile: {{ . | quote }}
        {{- end }}
      {{- if or (index $layout "runtimeNamespace") (index $layout "activeNamespace") (index $layout "plannedNamespace") (index $layout "registrationServiceNamespace") (index $layout "plannedRegistrationServiceNamespace") }}
      annotations:
        {{- with (index $layout "runtimeNamespace") }}
        validation-environment/runtime-namespace: {{ . | quote }}
        {{- end }}
        {{- with (index $layout "activeNamespace") }}
        validation-environment/active-namespace: {{ . | quote }}
        {{- end }}
        {{- with (index $layout "plannedNamespace") }}
        validation-environment/planned-namespace: {{ . | quote }}
        {{- end }}
        {{- with (index $layout "registrationServiceNamespace") }}
        validation-environment/registration-service-namespace: {{ . | quote }}
        {{- end }}
        {{- with (index $layout "plannedRegistrationServiceNamespace") }}
        validation-environment/planned-registration-service-namespace: {{ . | quote }}
        {{- end }}
      {{- end }}
    spec:
      {{- with .Values.hostAliases }}
      hostAliases:
      {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
      {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
      {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
      {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - env:
            - name: APP_THEME
              value: {{ (index $branding "theme" | default "theme-1") | quote }}
            - name: APP_BRAND_NAME
              value: {{ (index $branding "name" | default "PIONERA") | quote }}
            - name: APP_PRIMARY_COLOR
              value: {{ (index $branding "primaryColor" | default "") | quote }}
            - name: APP_SECONDARY_COLOR
              value: {{ (index $branding "secondaryColor" | default "") | quote }}
            - name: APP_SHOW_MENU_TEXT
              value: {{ (index $branding "showMenuText" | default "true") | quote }}
            - name: APP_BRANDING_ASSET_BASE_URL
              value: {{ $brandingAssetBaseUrl | quote }}
            - name: APP_LOGO_FILES
              value: {{ (index $branding "logoFiles" | default "") | quote }}
            - name: APP_LOGO_URLS
              value: {{ (index $branding "logoUrls" | default "") | quote }}
            - name: APP_FOOTER_LOGO_FILES
              value: {{ (index $branding "footerLogoFiles" | default "") | quote }}
            - name: APP_FOOTER_LOGO_URLS
              value: {{ (index $branding "footerLogoUrls" | default "") | quote }}
            - name: APP_POWERED_BY_TEXT
              value: {{ (index $branding "poweredByText" | default "Powered by:") | quote }}
            - name: APP_POWERED_BY_LOGO_FILES
              value: {{ (index $branding "poweredByLogoFiles" | default "") | quote }}
            - name: APP_POWERED_BY_LOGO_URLS
              value: {{ (index $branding "poweredByLogoUrls" | default "") | quote }}
            - name: APP_FOOTER_TEXT
              value: {{ (index $branding "footerText" | default "") | quote }}
            - name: APP_LOCAL_STORE_LABEL
              value: {{ (index $branding "localStoreLabel" | default "InesDataStore") | quote }}
            - name: APP_BASE_HREF
              value: {{ $connectorInterfacePublicBaseHref | quote }}
            - name: CATALOG_URL
              value: {{ $connectorPublicBase }}/management/federatedcatalog
            - name: MANAGEMENT_API_URL
              value: {{ $connectorPublicBase }}/management
            - name: SHARED_URL
              value: {{ $connectorPublicBase }}/shared
            - name: ONTOLOGY_URL
              value: {{ .Values.connectorInterface.ontologyHub.url | quote }}
            - name: STRAPI_URL
              value: {{ (index $modelObserver "strapiUrl" | default (index $modelObserver "proxyTarget") | default "") | quote }}
            - name: MODEL_OBSERVER_PROXY_TARGET
              value: {{ (index $modelObserver "proxyTarget" | default (index $modelObserver "strapiUrl") | default "") | quote }}
            - name: PARTICIPANT_ID
              value: {{ .Values.connector.name }}
            - name: OAUTH2_ALLOWED_URLS
              value: {{ $connectorPublicBase }},{{ $connectorIngressBase }},http://{{ .Values.connector.name }}:19193
            - name: OAUTH2_CLIENT_ID
              value: {{ .Values.connectorInterface.oauth2.client }}
            - name: OAUTH2_ISSUER
              value: {{ $keycloakPublicProtocol }}://{{ .Values.services.keycloak.external }}/realms/{{ .Values.connector.dataspace }}
            - name: OAUTH2_REDIRECT_PATH
              value: {{ $connectorInterfacePublicBaseHref | quote }}
            - name: OAUTH2_RESPONSE_TYPE
              value: {{ .Values.connectorInterface.oauth2.type }}
            - name: OAUTH2_SCOPE
              value: {{ .Values.connectorInterface.oauth2.scope }}
            - name: OAUTH2_SHOW_DEBUG_INFO
              value: "false"
          image: {{ .Values.connectorInterface.image.name }}:{{ .Values.connectorInterface.image.tag }}
          name: {{ .Values.connector.name }}-interface
          ports:
            - containerPort: 8080
              protocol: TCP
          {{ if or $brandingAssets $brandingAssetsConfigMapName }}
          volumeMounts:
            - name: branding-assets
              mountPath: /usr/share/nginx/html/connector-interface/assets/branding
              readOnly: true
          {{ end }}
      {{ if or $brandingAssets $brandingAssetsConfigMapName }}
      volumes:
        - name: branding-assets
          configMap:
            name: {{ $brandingAssetsConfigMapName | default (printf "%s-interface-branding-assets" .Values.connector.name) }}
      {{ end }}
      restartPolicy: Always
