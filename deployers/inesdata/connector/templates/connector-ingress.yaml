{{- define "inesdata.connectorIngressPaths" -}}
{{- $connectorName := .connectorName -}}
{{- $rootToInterface := .rootToInterface -}}
- pathType: Prefix
  path: /api
  backend:
    service:
      name: {{ $connectorName }}
      port:
        number: 19191
- pathType: Prefix
  path: /control
  backend:
    service:
      name: {{ $connectorName }}
      port:
        number: 19192
- pathType: Prefix
  path: /management
  backend:
    service:
      name: {{ $connectorName }}
      port:
        number: 19193
- pathType: Prefix
  path: /protocol
  backend:
    service:
      name: {{ $connectorName }}
      port:
        number: 19194
- pathType: Prefix
  path: /federatedcatalog
  backend:
    service:
      name: {{ $connectorName }}
      port:
        number: 19195
- pathType: Prefix
  path: /shared
  backend:
    service:
      name: {{ $connectorName }}
      port:
        number: 19196
- pathType: Prefix
  path: /public
  backend:
    service:
      name: {{ $connectorName }}
      port:
        number: 19291
- pathType: Prefix
  path: /inesdata-connector-interface
  backend:
    service:
      name: {{ $connectorName }}-interface
      port:
        number: 8080
{{- if $rootToInterface }}
- pathType: Prefix
  path: /
  backend:
    service:
      name: {{ $connectorName }}-interface
      port:
        number: 8080
{{- end }}
{{- end -}}
{{- $connectorName := .Values.connector.name -}}
{{- $ingress := .Values.connector.ingress | default dict -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.connector.name }}-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: {{ default "800m" .Values.connector.ingress.proxyBodySize | quote }}
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
    nginx.org/client-max-body-size: {{ default "800m" .Values.connector.ingress.proxyBodySize | quote }}
spec:
  rules:
  - host: {{ $ingress.hostname }}
    http:
      paths:
{{ include "inesdata.connectorIngressPaths" (dict "connectorName" $connectorName "rootToInterface" false) | indent 6 }}
{{- range $hostConfig := ($ingress.additionalHosts | default list) }}
  - host: {{ $hostConfig.hostname }}
    http:
      paths:
{{ include "inesdata.connectorIngressPaths" (dict "connectorName" $connectorName "rootToInterface" ($hostConfig.rootToInterface | default false)) | indent 6 }}
{{- end }}
{{- if eq .Values.connector.environment "pro" }}
  tls:
  - hosts:
    - {{ .Values.connector.ingress.hostname }}
    secretName: {{ .Values.connector.dataspace }}-{{ .Values.connector.name }}-tls-cert
{{- end }}
