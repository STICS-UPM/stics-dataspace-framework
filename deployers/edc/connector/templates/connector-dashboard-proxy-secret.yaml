{{- $dashboard := (index .Values "dashboard") | default dict }}
{{- $dashboardProxy := (index $dashboard "proxy") | default dict }}
{{- if and .Values.dashboard.enabled ((index $dashboardProxy "enabled") | default false) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.connector.name }}-dashboard-proxy-auth
  labels:
    validation-environment-adapter: edc
type: Opaque
stringData:
  proxy-auth.json: |
{{ toPrettyJson ((index $dashboardProxy "auth") | default dict) | indent 4 }}
{{- end }}
