{{- $layout := .Values.connector.layout | default dict }}
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    service: {{ .Values.connector.name }}
    validation-environment-adapter: edc
    {{- with (index $layout "role") }}
    validation-environment-role: {{ . | quote }}
    {{- end }}
    {{- with (index $layout "namespaceProfile") }}
    validation-environment-namespace-profile: {{ . | quote }}
    {{- end }}
  {{- if or (index $layout "runtimeNamespace") (index $layout "activeNamespace") (index $layout "plannedNamespace") (index $layout "registrationServiceNamespace") (index $layout "plannedRegistrationServiceNamespace") }}
  annotations:
    {{- with (index $layout "runtimeNamespace") }}
    validation-environment/runtime-namespace: {{ . | quote }}
    {{- end }}
    {{- with (index $layout "activeNamespace") }}
    validation-environment/active-namespace: {{ . | quote }}
    {{- end }}
    {{- with (index $layout "plannedNamespace") }}
    validation-environment/planned-namespace: {{ . | quote }}
    {{- end }}
    {{- with (index $layout "registrationServiceNamespace") }}
    validation-environment/registration-service-namespace: {{ . | quote }}
    {{- end }}
    {{- with (index $layout "plannedRegistrationServiceNamespace") }}
    validation-environment/planned-registration-service-namespace: {{ . | quote }}
    {{- end }}
  {{- end }}
  name: {{ .Values.connector.name }}
spec:
  replicas: {{ .Values.connector.replicas }}
  selector:
    matchLabels:
      service: {{ .Values.connector.name }}
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        service: {{ .Values.connector.name }}
        validation-environment-adapter: edc
        {{- with (index $layout "role") }}
        validation-environment-role: {{ . | quote }}
        {{- end }}
        {{- with (index $layout "namespaceProfile") }}
        validation-environment-namespace-profile: {{ . | quote }}
        {{- end }}
      annotations:
        checksum/connector-config: {{ tpl (.Files.Get "config/connector-configuration.properties.tpl") . | sha256sum | quote }}
        {{- with (index $layout "runtimeNamespace") }}
        validation-environment/runtime-namespace: {{ . | quote }}
        {{- end }}
        {{- with (index $layout "activeNamespace") }}
        validation-environment/active-namespace: {{ . | quote }}
        {{- end }}
        {{- with (index $layout "plannedNamespace") }}
        validation-environment/planned-namespace: {{ . | quote }}
        {{- end }}
        {{- with (index $layout "registrationServiceNamespace") }}
        validation-environment/registration-service-namespace: {{ . | quote }}
        {{- end }}
        {{- with (index $layout "plannedRegistrationServiceNamespace") }}
        validation-environment/planned-registration-service-namespace: {{ . | quote }}
        {{- end }}
    spec:
      {{- with .Values.hostAliases }}
      hostAliases:
      {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Values.connector.name }}
          image: {{ .Values.connector.image.name }}:{{ .Values.connector.image.tag }}
          imagePullPolicy: {{ .Values.connector.image.pullPolicy }}
          env:
            - name: EDC_FS_CONFIG
              value: {{ .Values.connector.configuration.configFilePath | quote }}
            - name: JAVA_TOOL_OPTIONS
              value: {{ .Values.connector.jvmArgs | quote }}
            {{- with .Values.connector.inference }}
            - name: EDC_INFERENCE_EDR_ATTEMPTS
              value: {{ .edrAttempts | default 40 | quote }}
            - name: EDC_INFERENCE_EDR_DELAY_MS
              value: {{ .edrDelayMs | default 1000 | quote }}
            {{- end }}
            {{- with .Values.connector.ontologyHub }}
            {{- with .externalBase }}
            - name: ONTOLOGY_HUB_EXTERNAL_BASE
              value: {{ . | quote }}
            {{- end }}
            {{- with .internalBase }}
            - name: ONTOLOGY_HUB_INTERNAL_BASE
              value: {{ . | quote }}
            {{- end }}
            {{- with .internalFallback }}
            - name: ONTOLOGY_HUB_INTERNAL_FALLBACK
              value: {{ . | quote }}
            {{- end }}
            {{- with .internalClusterLocalFallback }}
            - name: ONTOLOGY_HUB_INTERNAL_CLUSTERLOCAL_FALLBACK
              value: {{ . | quote }}
            {{- end }}
            {{- end }}
          ports:
            - containerPort: 19191
              protocol: TCP
            - containerPort: 19192
              protocol: TCP
            - containerPort: 19193
              protocol: TCP
            - containerPort: 19194
              protocol: TCP
            - containerPort: 19195
              protocol: TCP
            - containerPort: 19196
              protocol: TCP
            - containerPort: 19291
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: 19193
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 19193
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /opt/connector/config
              readOnly: true
{{- if (index (.Values.connector.tlsCacerts | default dict) "enabled") }}
            - name: tls-cacerts
              mountPath: {{ (index (.Values.connector.tlsCacerts | default dict) "mountPath") | default "/opt/connector/tls-cacerts" }}
{{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ .Values.connector.name }}-config
{{- if (index (.Values.connector.tlsCacerts | default dict) "enabled") }}
        - name: tls-cacerts
          secret:
            secretName: {{ (index (.Values.connector.tlsCacerts | default dict) "secretName") | default "common-tls-cacerts" }}
{{- end }}
      restartPolicy: Always
