source_documents:
  - INESData Level 6 UI support and ops validation design
  - INESData integration catalog in validation/projects/inesdata/integration/test_cases.yaml
  - Operational MinIO validation in validation/ui/ops

support_checks:
  - id: DS-UI-01
    scope: dataspace_ui
    case_group: support
    description: Portal login readiness
    type: ui
    validation_type: support
    dataspace_dimension: support
    execution_mode: ui_support
    coverage_status: automated
    mapping_status: supporting
    preconditions:
      - Connector portal URL is reachable
      - Valid connector credentials are available
    steps:
      - Open the connector portal
      - Authenticate through Keycloak when required
      - Verify that the portal shell loads correctly
    operations:
      - login
      - load_portal_shell
    expected_result: The authenticated connector shell becomes available
    automation:
      status: automated
      mode: ui_support
      ui_spec: validation/ui/adapters/inesdata/specs/01-login-readiness.spec.ts

ops_checks:
  - id: DS-UI-OPS-01
    scope: dataspace_ui
    case_group: ops
    description: MinIO bucket visibility from console
    type: ui
    validation_type: operational
    dataspace_dimension: storage
    execution_mode: ui_ops
    coverage_status: automated
    mapping_status: supporting
    preconditions:
      - MinIO Console is reachable
      - Provider and consumer buckets are available
    steps:
      - Open the MinIO Console
      - Inspect provider and consumer buckets
      - Confirm that the expected objects are visible
    operations:
      - inspect_storage
      - verify_bucket_visibility
    expected_result: The MinIO Console exposes the expected buckets and objects for operational verification
    automation:
      status: automated
      mode: ui_ops
      ui_spec: validation/ui/ops/minio-bucket-visibility.spec.ts
