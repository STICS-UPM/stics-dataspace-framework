source_documents:
  - INESData integration flows for A5.2/E5.2
  - Stable INESData Playwright flows in validation/ui/adapters/inesdata/specs
  - Component integration evidence linked from Ontology Hub, AI Model Hub and Semantic Virtualization catalogs

integration_cases:
  - id: DS-UI-03
    scope: inesdata_integration
    case_group: dataspace
    description: Provider asset creation and upload
    type: ui
    validation_type: functional
    dataspace_dimension: publication
    execution_mode: ui
    coverage_status: automated
    mapping_status: mapped
    preconditions:
      - Provider connector portal is reachable
      - Provider credentials are available
      - Upload storage is configured for the connector
    steps:
      - Create an asset through the provider portal
      - Upload a file into the configured storage destination
      - Verify that the creation flow finishes successfully
    operations:
      - create_asset
      - upload_asset_file
    expected_result: The asset is created successfully and the upload completes without HTTP errors
    automation:
      status: automated
      mode: ui
      ui_spec: validation/ui/adapters/inesdata/specs/03-provider-setup.spec.ts

  - id: DS-UI-03B
    scope: inesdata_integration
    case_group: dataspace
    description: Provider policy creation
    type: ui
    validation_type: functional
    dataspace_dimension: governance
    execution_mode: ui
    coverage_status: automated
    mapping_status: mapped
    preconditions:
      - Provider connector portal is reachable
      - Provider credentials are available
    steps:
      - Open the policy creation view
      - Define a participant constraint
      - Persist the policy through the UI
    operations:
      - create_policy
    expected_result: The policy is created and visible in the provider portal
    automation:
      status: automated
      mode: ui
      ui_spec: validation/ui/adapters/inesdata/specs/03b-provider-policy-create.spec.ts

  - id: DS-UI-03C
    scope: inesdata_integration
    case_group: dataspace
    description: Provider contract definition creation
    type: ui
    validation_type: functional
    dataspace_dimension: contracts
    execution_mode: ui
    coverage_status: automated
    mapping_status: mapped
    preconditions:
      - Provider connector portal is reachable
      - Provider credentials are available
      - A compatible asset and policy can be created during the flow
    steps:
      - Create the prerequisite asset and policy
      - Open the contract definition view
      - Create a contract definition that links the asset and policy
    operations:
      - create_contract_definition
      - link_asset_policy
    expected_result: The contract definition is created and listed successfully
    automation:
      status: automated
      mode: ui
      ui_spec: validation/ui/adapters/inesdata/specs/03c-provider-contract-definition-create.spec.ts

  - id: DS-UI-04
    scope: inesdata_integration
    case_group: dataspace
    description: Consumer catalog listing and detail
    type: ui
    validation_type: functional
    dataspace_dimension: discovery
    execution_mode: ui
    coverage_status: automated
    mapping_status: mapped
    preconditions:
      - Consumer connector portal is reachable
      - Consumer credentials are available
      - The catalog view is exposed by the portal
    steps:
      - Open the catalog section
      - Verify that the list renders without access errors
      - Open a catalog detail view when available
    operations:
      - list_catalog
      - open_catalog_detail
    expected_result: The consumer catalog loads and its detail surface is reachable without API errors
    automation:
      status: automated
      mode: ui
      ui_spec: validation/ui/adapters/inesdata/specs/04-consumer-catalog.spec.ts

  - id: DS-UI-05
    scope: inesdata_integration
    case_group: dataspace
    description: Consumer negotiation from catalog
    type: ui
    validation_type: integration
    dataspace_dimension: contracts
    execution_mode: ui_api
    coverage_status: automated
    mapping_status: mapped
    preconditions:
      - Provider and consumer connectors are reachable
      - Provider bootstrap data can be created through the management APIs
    steps:
      - Bootstrap a provider asset for negotiation
      - Open the consumer catalog and locate the asset
      - Negotiate the first available contract offer
    operations:
      - discover_asset
      - negotiate_contract
    expected_result: A contract negotiation completes successfully from the consumer UI
    automation:
      status: automated
      mode: ui_api
      ui_spec: validation/ui/adapters/inesdata/specs/05-consumer-negotiation.spec.ts

  - id: DS-UI-06
    scope: inesdata_integration
    case_group: dataspace
    description: Consumer transfer from contracts and history
    type: ui
    validation_type: integration
    dataspace_dimension: transfer
    execution_mode: ui_api
    coverage_status: automated
    mapping_status: mapped
    preconditions:
      - Provider and consumer connectors are reachable
      - Provider bootstrap data can be created through the management APIs
      - Contract negotiation can complete successfully
    steps:
      - Bootstrap a provider asset and negotiate it from the consumer UI
      - Start an INESDataStore transfer from the contracts view
      - Confirm the successful transfer in the transfer history view
    operations:
      - discover_asset
      - negotiate_contract
      - start_transfer
      - check_transfer_history
    expected_result: The transfer is initiated successfully and reaches a successful final state in the UI
    automation:
      status: automated
      mode: ui_api
      ui_spec: validation/ui/adapters/inesdata/specs/06-consumer-transfer.spec.ts

  - id: DS-UI-SV-01
    scope: inesdata_integration
    case_group: semantic_virtualization
    description: Semantic Virtualization HttpData discovery and negotiation from INESData UI
    type: ui
    validation_type: integration
    dataspace_dimension: semantic_interoperability
    execution_mode: ui_api
    coverage_status: automated
    mapping_status: mapped
    preconditions:
      - INESData provider and consumer connectors are reachable
      - The Semantic Virtualization service is deployed in Level 5
      - The Semantic Virtualization internal HttpData URL is reachable from connector pods
    steps:
      - Bootstrap a provider asset whose HttpData address points to the Semantic Virtualization query endpoint
      - Open the consumer catalog from the INESData UI
      - Locate and open the Semantic Virtualization asset
      - Open contract offers and negotiate access from the UI
      - Confirm that the consumer connector records a contract agreement for the virtualized asset
    operations:
      - publish_semantic_virtualization_httpdata
      - discover_asset
      - open_catalog_detail
      - negotiate_contract
      - verify_contract_agreement
    expected_result: The Semantic Virtualization HttpData asset is visible from the consumer UI, can be negotiated successfully and produces a consumer contract agreement
    automation:
      status: automated
      mode: ui_api
      ui_spec: validation/ui/adapters/inesdata/specs/07-semantic-virtualization-httpdata.spec.ts
      runtime_env:
        UI_SEMANTIC_VIRTUALIZATION_HTTPDATA_DEMO: "1"
      linked_cases:
        - PT5-VS-11
        - INT-VS-DS-01
        - SV-GTFS-BENCH-04

  - id: DS-UI-OH-01
    scope: inesdata_integration
    case_group: ontology_hub
    description: Ontology Hub read-only integration from the INESData UI
    type: ui
    validation_type: integration
    dataspace_dimension: semantic_interoperability
    execution_mode: ui_readonly
    coverage_status: automated
    mapping_status: mapped
    preconditions:
      - INESData consumer connector portal is reachable
      - Ontology Hub public API is reachable from the browser context
      - The connector UI runtime config exposes ontologyUrl
      - The connector shared vocabulary API is deployed
    steps:
      - Open the INESData connector UI and authenticate
      - Verify that the Vocabularies route calls the shared connector vocabulary API
      - Verify that the Ontologies route calls the Ontology Hub vocabulary list API
      - Capture screenshots and JSON evidence without creating or deleting resources
    operations:
      - login
      - open_vocabularies_route
      - request_shared_vocabularies
      - open_ontologies_route
      - request_ontology_hub_vocabulary_list
    expected_result: INESData exposes the Ontology Hub integration points and both read-only calls return HTTP 200
    automation:
      status: automated
      mode: ui_readonly
      ui_spec: validation/ui/adapters/inesdata/specs/08-ontology-hub-inesdata-readonly.spec.ts
      runtime_env:
        UI_ONTOLOGY_HUB_INESDATA_DEMO: "1"
      linked_cases:
        - PT5-OH-16
        - INT-OH-DS-03

  - id: DS-UI-AMH-01
    scope: inesdata_integration
    case_group: ai_model_hub
    description: AI Model Hub HttpData model discovery and negotiation from INESData UI
    type: ui
    validation_type: integration
    dataspace_dimension: model_governance
    execution_mode: ui_api
    coverage_status: automated
    mapping_status: mapped
    preconditions:
      - INESData provider and consumer connectors are reachable
      - A controlled model endpoint can be represented as an HttpData asset
      - The connector contract cycle is operational
    steps:
      - Bootstrap a provider asset whose HttpData address represents an AI Model Hub model endpoint
      - Open the consumer catalog from the INESData UI
      - Locate and open the AI Model Hub model asset
      - Validate visible controlled metadata for the model asset
      - Open contract offers and negotiate access from the UI
      - Confirm that the consumer connector records a contract agreement for the model asset
    operations:
      - publish_ai_model_httpdata
      - discover_asset
      - open_catalog_detail
      - validate_model_metadata
      - negotiate_contract
      - verify_contract_agreement
    expected_result: The AI Model Hub HttpData model asset is visible from the consumer UI, exposes controlled metadata and produces a consumer contract agreement after negotiation
    automation:
      status: automated
      mode: ui_api
      ui_spec: validation/ui/adapters/inesdata/specs/09-ai-model-hub-httpdata.spec.ts
      runtime_env:
        UI_AI_MODEL_HUB_HTTPDATA_DEMO: "1"
      linked_cases:
        - PT5-MH-03
        - PT5-MH-08
        - PT5-MH-09
        - PT5-MH-10
        - PT5-MH-18

  - id: DS-UI-AMH-BROWSER-01
    scope: inesdata_integration
    case_group: ai_model_hub
    description: AI Model Browser specialized discovery, filtering and detail from INESData UI
    type: ui
    validation_type: functional
    dataspace_dimension: model_discovery
    execution_mode: ui_api
    coverage_status: automated
    mapping_status: mapped
    preconditions:
      - INESData provider and consumer connectors are reachable
      - Controlled machine-learning HttpData assets can be published with contract offers
      - AI Model Browser is integrated in the INESData connector interface
    steps:
      - Bootstrap two provider assets with divergent machine-learning DAIMO metadata and HttpData addresses
      - Open AI Model Browser from the INESData consumer UI
      - Search the controlled models by run identifier
      - Validate visible model metadata, source and contract availability for the target model
      - Apply source and storage filters without losing the controlled models
      - Apply task, subtask, algorithm, library, framework, software and format filters
      - Verify that rich DAIMO filters keep the target model and hide the contrast model
      - Use the Browser primary Negotiate action to open the contract offer surface
      - Open the model detail surface from AI Model Browser
      - Validate federated detail fields and contract offer controls
      - Open the Observer asset timeline for the target model when the Observer backend is available
    operations:
      - publish_machine_learning_httpdata
      - open_ai_model_browser
      - search_model
      - validate_model_card_metadata
      - filter_model_results_by_source_and_storage
      - filter_model_results_by_daimo_metadata
      - open_contract_offer_from_browser_primary_action
      - open_model_detail
      - validate_model_detail_and_offer
      - validate_browser_observer_evidence
    expected_result: AI Model Browser lists the controlled models, supports search, applies rich DAIMO filters correctly, opens the contract offer surface from the primary Negotiate action, opens a target model detail view with federated metadata and contract offer controls, and links Browser activity to Observer evidence when the backend is available
    automation:
      status: automated
      mode: ui_api
      ui_spec: validation/ui/adapters/inesdata/specs/11-ai-model-browser.spec.ts
      runtime_env:
        UI_AI_MODEL_HUB_HTTPDATA_DEMO: "1"
      linked_cases:
        - PT5-MH-01
        - PT5-MH-04
        - PT5-MH-05
        - PT5-MH-06
        - PT5-MH-07
        - PT5-MH-08
        - MH-OBS-03
      notes: The Browser spec validates the primary Negotiate entry point without completing an additional negotiation; full negotiation completion remains covered by the dedicated contract suites. Observer timeline validation is recorded as a controlled subcheck when the backend is not available in the environment.

  - id: DS-UI-AMH-EXEC-01
    scope: inesdata_integration
    case_group: ai_model_hub
    description: AI Model Execution local model-server inference from INESData UI
    type: ui
    validation_type: functional
    dataspace_dimension: model_execution
    execution_mode: ui_api
    coverage_status: automated
    mapping_status: mapped
    preconditions:
      - INESData provider connector portal is reachable
      - The deterministic model-server service is deployed and reachable from connector pods
      - AI Model Execution is integrated in the INESData connector interface
    steps:
      - Bootstrap a local provider asset with machine-learning metadata and an HttpData address pointing to model-server
      - Open AI Model Execution from the INESData provider UI
      - Select the controlled executable model
      - Validate the generated input metadata and example payload
      - Validate that malformed JSON and missing required fields are rejected before execution
      - Execute the model through the connector-side model execution API
      - Validate the visible status, output and execution history
      - Open the Observer asset timeline filtered by the generated execution correlationId when the Observer backend is available
    operations:
      - publish_machine_learning_httpdata
      - open_ai_model_execution
      - select_executable_model
      - validate_execution_input_metadata
      - validate_execution_input_schema_errors
      - execute_model
      - validate_execution_output
      - inspect_execution_history
      - validate_execution_observer_evidence
    expected_result: AI Model Execution validates payloads against the model input metadata, runs the controlled model-server endpoint from INESData, displays a successful deterministic inference result and links execution activity to Observer evidence when the backend is available
    automation:
      status: automated
      mode: ui_api
      ui_spec: validation/ui/adapters/inesdata/specs/12-ai-model-execution.spec.ts
      runtime_env:
        UI_AI_MODEL_HUB_HTTPDATA_DEMO: "1"
      fixture:
        source: adapters/inesdata/sources/model-server
        endpoint: /api/v1/nlp/ecommerce-sentiment
        note: Temporary deterministic fixture until real A5.2 models are integrated.
      notes: The spec checks malformed JSON, missing required input fields, successful execution output, in-session execution history and Observer timeline evidence for the generated execution correlationId. Observer evidence is recorded as a controlled subcheck when the backend is not available in the environment.
      linked_cases:
        - PT5-MH-10
        - PT5-MH-17
        - MH-OBS-04

  - id: DS-UI-AMH-EXEC-02
    scope: inesdata_integration
    case_group: ai_model_hub
    description: AI Model Execution external model inference after INESData contract agreement
    type: ui_api
    validation_type: integration
    dataspace_dimension: model_execution
    execution_mode: ui_api
    coverage_status: automated
    mapping_status: mapped
    preconditions:
      - INESData provider and consumer connector portals are reachable
      - The deterministic model-server service is deployed and reachable from connector pods
      - A provider-side machine-learning HttpData asset can be negotiated by the consumer
      - AI Model Execution is integrated in the INESData consumer connector interface
    steps:
      - Bootstrap a provider machine-learning HttpData asset pointing to model-server
      - Verify that the asset is visible in the consumer federated catalog
      - Create a consumer contract negotiation and wait for the resulting agreement
      - Open AI Model Execution from the INESData consumer UI
      - Select the model from External Assets With Agreement
      - Execute the model through the connector-side model execution API
      - Validate the visible status, output and execution history
      - Open the Observer asset timeline filtered by the generated execution correlationId when the Observer backend is available
    operations:
      - publish_provider_machine_learning_httpdata
      - request_consumer_catalog
      - negotiate_contract_agreement
      - open_consumer_ai_model_execution
      - select_external_model_with_agreement
      - execute_external_model
      - validate_execution_output
      - inspect_execution_history
      - validate_execution_observer_evidence
    expected_result: The consumer can execute an external provider model only after a contract agreement exists, and the execution produces auditable output and Observer evidence when available
    automation:
      status: automated
      mode: ui_api
      ui_spec: validation/ui/adapters/inesdata/specs/15-ai-model-external-execution.spec.ts
      runtime_env:
        UI_AI_MODEL_HUB_HTTPDATA_DEMO: "1"
      fixture:
        source: adapters/inesdata/sources/model-server
        endpoint: /api/v1/nlp/twitter-sentiment
        transfer_type: HttpData-PULL
        note: Temporary deterministic fixture until real A5.2 models are integrated.
      notes: The spec validates the agreed external execution path without invoking Kafka. It creates a run-scoped provider model, negotiates access from the consumer, selects it from External Assets With Agreement and executes it through the model execution API.
      linked_cases:
        - PT5-MH-10
        - PT5-MH-11
        - PT5-MH-17
        - AMH-INTEG-EXEC-AGREED-02
        - MH-OBS-04

  - id: DS-UI-AMH-BENCH-01
    scope: inesdata_integration
    case_group: ai_model_hub
    description: AI Model Benchmarking local model-server comparison from INESData UI
    type: ui
    validation_type: integration
    dataspace_dimension: model_benchmarking
    execution_mode: ui_api
    coverage_status: automated
    mapping_status: mapped
    preconditions:
      - INESData provider connector portal is reachable
      - The deterministic model-server service is deployed and reachable from connector pods
      - AI Model Benchmarking is integrated in the INESData connector interface
    steps:
      - Bootstrap two local provider assets with comparable machine-learning HttpData metadata
      - Open AI Model Benchmarking from the INESData provider UI
      - Select the two controlled models
      - Validate the generated benchmark input against the selected model schema
      - Obtain preliminary outputs for both selected models
      - Download a suggested CSV dataset generated for the first selected model
      - Upload a small validation CSV with expected sentiment labels
      - Run the benchmark through the connector-side execution API
      - Validate the visible ranking, metrics summary and benchmark evidence entry point
      - Export the ranking results as CSV and validate the downloaded content
      - Open the Observer benchmark evidence route for the generated benchmarkRunId when the Observer backend is available
    operations:
      - publish_machine_learning_httpdata
      - open_ai_model_benchmarking
      - select_benchmark_models
      - validate_benchmark_input
      - obtain_model_outputs
      - download_suggested_dataset
      - upload_validation_dataset
      - run_model_benchmark
      - validate_benchmark_ranking
      - export_benchmark_results
      - validate_observer_benchmark_evidence
    expected_result: AI Model Benchmarking validates benchmark input, obtains outputs for both controlled model-server endpoints, provides a suggested CSV dataset, compares the models from INESData, displays ranking evidence, exports the ranking CSV and links the generated benchmarkRunId to Observer evidence when the backend is available
    automation:
      status: automated
      mode: ui_api
      ui_spec: validation/ui/adapters/inesdata/specs/13-ai-model-benchmarking.spec.ts
      runtime_env:
        UI_AI_MODEL_HUB_HTTPDATA_DEMO: "1"
      fixture:
        source: adapters/inesdata/sources/model-server
        endpoints:
          - /api/v1/nlp/ecommerce-sentiment
          - /api/v1/nlp/twitter-sentiment
        dataset_rows: 5
        note: Temporary deterministic fixture until real A5.2 models are integrated.
      notes: The spec validates generated single input, obtains outputs for the selected models, downloads a suggested CSV dataset, uploads the controlled validation CSV, runs the ranking benchmark, verifies the exported ranking CSV and opens Observer benchmark evidence for the generated benchmarkRunId. Observer evidence is recorded as a controlled subcheck when the backend is not available in the environment.
      linked_cases:
        - PT5-MH-12
        - PT5-MH-13
        - PT5-MH-14
        - PT5-MH-15
        - MH-OBS-05

  - id: DS-UI-AMH-DAIMO-01
    scope: inesdata_integration
    case_group: ai_model_hub
    description: AI Model Hub DAIMO machine-learning vocabulary creation from INESData UI
    type: ui_api
    validation_type: integration
    dataspace_dimension: semantic_metadata
    execution_mode: ui_api
    coverage_status: automated
    mapping_status: mapped
    preconditions:
      - INESData provider connector portal is reachable
      - The connector vocabulary API is deployed
      - The Vocabularies UI exposes the machine-learning asset category
      - Playwright interaction markers are enabled for audit-ready evidence
    steps:
      - Open the INESData provider connector UI and authenticate
      - Open Vocabularies and create a run-scoped vocabulary
      - Select the Machine learning category
      - Register a controlled DAIMO JSON Schema for model metadata
      - Verify that the vocabulary is persisted through the shared vocabulary API
      - Open the JSON Schema dialog from the vocabulary card
      - Open asset creation, select Machine learning and verify that the DAIMO vocabulary is available as metadata form
    operations:
      - login_provider
      - open_vocabularies_route
      - create_machine_learning_vocabulary
      - submit_daimo_json_schema
      - request_shared_vocabularies
      - inspect_vocabulary_schema_dialog
      - verify_daimo_vocabulary_in_machine_learning_asset_creation
    expected_result: INESData persists a machine-learning vocabulary with DAIMO schema fields and exposes it in the Machine learning asset creation metadata surface
    automation:
      status: automated
      mode: ui_api
      ui_spec: validation/ui/adapters/inesdata/specs/14-ai-model-daimo-vocabulary.spec.ts
      runtime_env:
        UI_AI_MODEL_HUB_HTTPDATA_DEMO: "1"
        PLAYWRIGHT_INTERACTION_MARKERS: "1"
      linked_cases:
        - PT5-MH-02
        - PT5-MH-06
        - PT5-MH-17
        - AMH-DAIMO-VOCAB-01
      notes: The spec creates a run-scoped vocabulary through the INESData UI, validates the persisted shared vocabulary payload, opens the schema dialog and verifies that the vocabulary can be selected from Machine learning asset creation. It does not create an asset and does not require real model endpoints.

  - id: DS-UI-AMH-OBS-01
    scope: inesdata_integration
    case_group: ai_model_hub
    description: AI Model Observer home and evidence navigation from INESData UI
    type: ui
    validation_type: non_functional
    dataspace_dimension: model_governance
    execution_mode: ui_contract
    coverage_status: automated
    mapping_status: mapped
    preconditions:
      - AI Model Observer UI is integrated in the INESData connector interface
      - INESData consumer connector portal is reachable
      - Playwright interaction markers are enabled for audit-ready evidence
    steps:
      - Open the INESData connector UI and authenticate
      - Open AI Model Observer
      - Verify the Asset timeline, Agreement evidence, Benchmark evidence and Participant summary cards
      - Enter controlled identifiers and navigate to each evidence route
      - Capture screenshots and JSON evidence without mutating contracts or assets
    operations:
      - login
      - open_ai_model_observer
      - verify_observer_cards
      - navigate_asset_timeline
      - navigate_agreement_evidence
      - navigate_benchmark_evidence
      - navigate_participant_summary
    expected_result: The AI Model Observer UI is available from INESData and its main evidence navigation routes are demonstrable for auditors
    automation:
      status: automated
      mode: ui_contract
      ui_spec: validation/ui/adapters/inesdata/specs/10-ai-model-observer.spec.ts
      runtime_env:
        UI_AI_MODEL_OBSERVER_DEMO: "1"
        PLAYWRIGHT_INTERACTION_MARKERS: "1"
      linked_cases:
        - MH-OBS-01
        - PT5-MH-17
        - Model Clearing House
      notes: The INESData connector interface and public portal backend include the Observer UI/API contract. The spec keeps a controlled skip only for older connector images that do not expose the route yet.

  - id: DS-UI-AMH-OBS-02
    scope: inesdata_integration
    case_group: ai_model_hub
    description: AI Model Observer participant summary aggregates controlled model evidence
    type: ui_api
    validation_type: non_functional
    dataspace_dimension: model_governance
    execution_mode: ui_api
    coverage_status: automated
    mapping_status: mapped
    preconditions:
      - AI Model Observer UI/API is available through the INESData connector interface
      - INESData consumer connector portal is reachable
      - Playwright interaction markers are enabled for audit-ready evidence
    steps:
      - Open the INESData connector UI and authenticate
      - Open AI Model Observer
      - Seed a run-scoped controlled event batch through the Observer proxy
      - Open the Participant summary route for the controlled consumer participant
      - Verify totals by event type, latest evidence metadata and navigation to the asset timeline
    operations:
      - login_consumer
      - open_ai_model_observer
      - seed_controlled_observer_events
      - open_participant_summary
      - verify_event_type_totals
      - navigate_latest_event_asset_timeline
    expected_result: The AI Model Observer participant summary exposes auditable model operation totals without storing raw datasets, secrets or sensitive payloads
    automation:
      status: automated
      mode: ui_api
      ui_spec: validation/ui/adapters/inesdata/specs/16-ai-model-observer-participant-summary.spec.ts
      runtime_env:
        UI_AI_MODEL_OBSERVER_DEMO: "1"
        PLAYWRIGHT_INTERACTION_MARKERS: "1"
      linked_cases:
        - MH-OBS-06
        - PT5-MH-17
        - Model Clearing House
      notes: The spec uses run-scoped synthetic metadata and hashes only. It records a controlled skip when an older environment does not expose the Observer UI/API yet.
