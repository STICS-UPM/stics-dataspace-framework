source_documents:
  - PIONERA E4.1 - final.docx
  - Official PT5 cases normalized for AI Model Hub
  - Local functional analysis of the AIModelHub repository
  - E5.2 pre-integration strategy for Validation-Environment

support_checks:
  - id: MH-BOOTSTRAP-01
    component: ai_model_hub
    case_group: support
    description: Dashboard shell availability
    type: api
    validation_type: support
    dataspace_dimension: support
    execution_mode: api_support
    coverage_status: automated
    mapping_status: supporting
    preconditions:
      - AI Model Hub base URL is known
      - The dashboard is deployed and reachable
    steps:
      - Open the dashboard base URL
      - Confirm that the application shell is returned
    expected_result: The dashboard shell is served successfully
    automation:
      status: automated
      mode: api_support
      runner_case: mh_bootstrap_01_shell
      real_flow:
        method: GET
        path: /
      notes: Bootstrap support check used before PT5 UI automation is enabled.

  - id: MH-BOOTSTRAP-02
    component: ai_model_hub
    case_group: support
    description: Runtime application configuration availability
    type: api
    validation_type: support
    dataspace_dimension: support
    execution_mode: api_support
    coverage_status: automated
    mapping_status: supporting
    preconditions:
      - AI Model Hub base URL is known
      - The dashboard serves runtime configuration files
    steps:
      - Request the runtime application configuration
      - Confirm that the payload exposes dashboard metadata
    expected_result: Runtime configuration is available and usable
    automation:
      status: automated
      mode: api_support
      runner_case: mh_bootstrap_02_runtime_config
      real_flow:
        method: GET
        path: /config/app-config.json
      notes: Bootstrap support check used to confirm that runtime configuration is wired before UI flows are automated.

test_cases:
  - id: PT5-MH-01
    component: ai_model_hub
    case_group: pt5
    description: Access to the model catalog
    type: ui
    validation_type: functional
    dataspace_dimension: access
    execution_mode: ui
    coverage_status: automated
    mapping_status: mapped
    preconditions:
      - AI Model Hub is deployed and reachable
      - At least one valid connector or catalog context configuration exists
    steps:
      - Access the catalog route from the component UI
      - Confirm that the catalog request view becomes operational
      - Open the manual catalog request dialog
      - Fill the provider protocol URL and connector identifier without submitting the request
      - Confirm that the request form is ready to execute a catalog request
    expected_result: The catalog route and manual request surface are operational
    traceability:
      - MH-01
    notes: Automated UI validation for catalog access. It validates the route, shell readiness, public error absence and manual catalog request surface without creating additional catalog traffic. Deeper catalog publication, search, negotiation and governance semantics are covered by the mapped downstream PT5 cases.
    automation:
      status: automated
      mode: ui
      ui_spec: validation/components/ai_model_hub/ui/specs/pt5_mh_01_catalog_access.spec.js
      notes: The Playwright spec verifies the catalog route, primary request button, manual request dialog, provider protocol URL field, connector identifier field and enabled submit state after valid controlled input.

  - id: PT5-MH-02
    component: ai_model_hub
    case_group: pt5
    description: Model publication
    type: ui
    validation_type: functional
    dataspace_dimension: publication
    execution_mode: ui
    coverage_status: automated
    mapping_status: mapped
    preconditions:
      - A provider user with adequate permissions is available
      - The model creation form is accessible
    steps:
      - Register a model with valid metadata
      - Add advanced DAIMO metadata for modality, runtime, input contract, inference path and governance fields
      - Save the model in local state
    expected_result: The model is created in local state with core and advanced DAIMO metadata persisted
    traceability:
      - MH-04
      - MH-05
      - MH-06
      - MH-07
      - MH-08
      - MH-09
      - MH-10
      - MH-11
      - MH-12
      - MH-13
    notes: Automated UI validation for local model registration. It validates component-side publication with core metadata, advanced DAIMO metadata, HttpData persistence, input schema/example and governance fields. Federated publication is tracked separately in PT5-MH-03.
    automation:
      status: automated
      mode: ui
      ui_spec: validation/components/ai_model_hub/ui/specs/pt5_mh_02_model_registration.spec.js
      notes: The Playwright spec covers provider-side local asset creation and verifies the persisted management asset, including advanced DAIMO properties used later by Browser, Execution and Benchmarking flows.

  - id: PT5-MH-03
    component: ai_model_hub
    case_group: pt5
    description: Model publication
    type: ui
    validation_type: integration
    dataspace_dimension: publication
    execution_mode: api_ui
    coverage_status: automated
    mapping_status: mapped
    preconditions:
      - A local model has already been registered
      - The connector federated catalog is available
    steps:
      - Publish the model into the federated catalog
      - Check the external visibility of the model
    expected_result: The model is externally visible
    traceability:
      - MH-14
      - MH-15
    notes: Automated integration flow validating alignment between the component UI and connector APIs. It has INESData evidence with visual markers.
    automation:
      status: automated
      mode: api_ui
      ui_spec: validation/components/ai_model_hub/ui/specs/pt5_mh_03_catalog_publication.spec.js
      latest_inesdata_ui_evidence: experiments/ai-model-hub-inesdata-ui-marked-20260506/components/ai-model-hub/inesdata-ui/results.json
      latest_dashboard: experiments/ai-model-hub-inesdata-ui-marked-20260506/framework-report/index.html
      visual_markers: PLAYWRIGHT_INTERACTION_MARKERS=1
      notes: The first automation slice bootstraps a provider-side published asset via management API and verifies external visibility from the consumer catalog UI.

  - id: PT5-MH-04
    component: ai_model_hub
    case_group: pt5
    description: Model discovery
    type: ui
    validation_type: functional
    dataspace_dimension: discovery
    execution_mode: api_ui
    coverage_status: automated
    mapping_status: mapped
    preconditions:
      - The consumer connector management API is reachable
      - The model discovery UI is reachable
    steps:
      - Seed a controlled local machine learning asset through the connector management API
      - Open the model discovery UI
      - Search the controlled asset by name
      - Confirm that the controlled model card is listed without application errors
    expected_result: The controlled local model is listed correctly
    traceability:
      - MH-16
    notes: Automated API/UI validation for listing readiness. It creates a run-scoped local model asset and verifies that the discovery UI renders the corresponding model card.
    automation:
      status: automated
      mode: api_ui
      ui_spec: validation/components/ai_model_hub/ui/specs/pt5_mh_04_model_listing.spec.js
      notes: The Playwright spec seeds a controlled consumer-side machineLearning HttpData asset, waits for management visibility and validates that the ML assets discovery view lists it.

  - id: PT5-MH-05
    component: ai_model_hub
    case_group: pt5
    description: Model discovery
    type: ui
    validation_type: functional
    dataspace_dimension: discovery
    execution_mode: api_ui
    coverage_status: automated
    mapping_status: mapped
    preconditions:
      - The consumer connector management API is reachable
      - The global search bar is visible
    steps:
      - Seed one matching model and one non-matching control model through the connector management API
      - Search models using a run-scoped free text token
      - Verify that the matching model is returned
      - Verify that the non-matching control model is excluded
    expected_result: Search results are coherent with the query and controlled fixture data
    traceability:
      - MH-17
    notes: Automated API/UI validation for search semantics. It uses run-scoped synthetic model metadata and does not depend on pre-existing catalog data.
    automation:
      status: automated
      mode: api_ui
      ui_spec: validation/components/ai_model_hub/ui/specs/pt5_mh_05_search.spec.js
      notes: The Playwright spec seeds controlled matching and non-matching local assets, applies a unique search token and verifies inclusion/exclusion in the UI result set.

  - id: PT5-MH-06
    component: ai_model_hub
    case_group: pt5
    description: Model discovery
    type: ui
    validation_type: functional
    dataspace_dimension: discovery
    execution_mode: ui
    coverage_status: automated
    mapping_status: mapped
    preconditions:
      - The catalog shows a filter panel
      - Sufficient metadata exists to discriminate results
    steps:
      - Seed controlled models with divergent DAIMO metadata
      - Filter models by task, subtask, algorithm, library, framework, software and format
      - Review the resulting set
    expected_result: Filters discriminate the controlled model result set correctly
    traceability:
      - MH-18
      - MH-19
      - MH-20
      - MH-21
      - MH-22
      - MH-23
      - MH-24
    notes: Automated UI/API validation for filter readiness. It bootstraps controlled model assets and verifies that metadata filters discriminate the result set in both the component and INESData browser surfaces.
    automation:
      status: automated
      mode: api_ui
      ui_spec: validation/components/ai_model_hub/ui/specs/pt5_mh_06_filters.spec.js
      inesdata_ui_spec: validation/ui/adapters/inesdata/specs/11-ai-model-browser.spec.ts
      inesdata_ui_evidence_case: DS-UI-AMH-BROWSER-01
      notes: The component spec verifies filter-shell availability and task filtering with controlled local assets. The INESData spec publishes two federated machineLearning HttpData assets with divergent DAIMO metadata and validates source, storage, task, subtask, algorithm, library, framework, software and format filters.

  - id: PT5-MH-07
    component: ai_model_hub
    case_group: pt5
    description: Model discovery
    type: ui
    validation_type: functional
    dataspace_dimension: visualization
    execution_mode: ui
    coverage_status: automated
    mapping_status: mapped
    preconditions:
      - At least one model is visible in the catalog
    steps:
      - Open the detailed model page
      - Review functional and technical metadata
      - Verify federated detail information and contract offer availability from INESData
    expected_result: Model detail metadata and related contract offer information are visible
    traceability:
      - MH-25
      - MH-26
    notes: Automated UI/API validation for model details. It bootstraps controlled metadata and validates local component details plus the INESData federated detail view.
    automation:
      status: automated
      mode: api_ui
      ui_spec: validation/components/ai_model_hub/ui/specs/pt5_mh_07_model_details.spec.js
      inesdata_ui_spec: validation/ui/adapters/inesdata/specs/11-ai-model-browser.spec.ts
      inesdata_ui_evidence_case: DS-UI-AMH-BROWSER-01
      notes: The component spec bootstraps a local consumer-side model asset via management API and validates the detailed metadata modal in ML Assets. The INESData spec opens the federated catalog detail from AI Model Browser and checks asset identity, name, content type, format, asset type and contract offer controls after also validating that the Browser primary Negotiate action opens the offer surface.

  - id: PT5-MH-08
    component: ai_model_hub
    case_group: pt5
    description: Contracting and execution
    type: ui
    validation_type: integration
    dataspace_dimension: contracts
    execution_mode: api_ui
    coverage_status: automated
    mapping_status: mapped
    preconditions:
      - A model with an available contract offer exists
      - The connector contract cycle is operational
    steps:
      - Start the contract negotiation
      - Finalize the negotiation from the consumer side
      - Confirm the creation of the contract or related agreement
      - Open the Contracts module and locate the agreement by asset identifier
      - Open the contract details payload
    expected_result: The contract is registered
    traceability:
      - MH-28
      - MH-29
      - MH-30
      - MH-31
      - MH-32
    notes: Automated integration flow. It publishes a controlled provider asset, validates visible offer selection and ODRL offer payload, negotiates it from the consumer catalog UI, verifies the resulting agreement and confirms that the Contracts module lists the contract with details available. The INESData Browser suite additionally validates that the model card primary Negotiate action opens the offer surface without duplicating the negotiation.
    automation:
      status: automated
      mode: api_ui
      ui_spec: validation/components/ai_model_hub/ui/specs/pt5_mh_08_contract_negotiation.spec.js
      latest_inesdata_ui_evidence: experiments/ai-model-hub-inesdata-ui-marked-20260506/components/ai-model-hub/inesdata-ui/results.json
      latest_dashboard: experiments/ai-model-hub-inesdata-ui-marked-20260506/framework-report/index.html
      visual_markers: PLAYWRIGHT_INTERACTION_MARKERS=1
      notes: The automation slice publishes a provider asset, validates the visible offer selection and selected ODRL payload, negotiates it from the consumer catalog UI, confirms the resulting agreement through the consumer management API, then searches the Contracts module by asset identifier and opens the agreement JSON-LD details.

  - id: PT5-MH-09
    component: ai_model_hub
    case_group: pt5
    description: Contracting and execution
    type: api
    validation_type: integration
    dataspace_dimension: execution
    execution_mode: api
    coverage_status: automated
    mapping_status: mapped
    preconditions:
      - A valid agreement exists for the remote model
      - The transfer mechanism is configured
    steps:
      - Request download or access to the model
      - Validate the authorized transfer
    expected_result: Authorized transfer
    traceability:
      - MH-33
    automation:
      status: automated
      mode: api
      runner: validation/components/ai_model_hub/connector_governance_api.py
      evidence_case: PT5-MH-09
      enable_with: AI_MODEL_HUB_ENABLE_CONNECTOR_GOVERNANCE=1
      latest_inesdata_ui_evidence: experiments/ai-model-hub-inesdata-ui-marked-20260506/components/ai-model-hub/inesdata-ui/results.json
      latest_dashboard: experiments/ai-model-hub-inesdata-ui-marked-20260506/framework-report/index.html
      visual_markers: PLAYWRIGHT_INTERACTION_MARKERS=1
      notes: The runner publishes a temporary HttpData model endpoint, negotiates access and starts an authorized model access transfer from the consumer connector.

  - id: PT5-MH-10
    component: ai_model_hub
    case_group: pt5
    description: Contracting and execution
    type: api
    validation_type: integration
    dataspace_dimension: execution
    execution_mode: api
    coverage_status: automated
    mapping_status: mapped
    preconditions:
      - A controlled executable model endpoint exists as HttpData
      - For remote models, the corresponding contractual agreement is active
    steps:
      - Create a temporary HttpData asset for the executable endpoint
      - Validate UI payload checks for malformed JSON and missing required fields from INESData
      - For remote execution, negotiate a consumer agreement before exposing the model in the consumer UI
      - Execute inference through /management/v3/modelexecutions/execute
      - Validate the model response
      - Delete the temporary asset
    expected_result: Response conforms to the model contract
    traceability:
      - MH-34
      - MH-35
    notes: Automated controlled baseline for connector-side execution of HttpData model endpoints. INESData UI execution is covered by DS-UI-AMH-EXEC-01 using a local deterministic model-server fixture and DS-UI-AMH-EXEC-02 using an external provider model after consumer agreement. Real A5.2 models remain a component evolution item and are not required to close this baseline.
    automation:
      status: automated
      mode: api
      runner: validation/components/ai_model_hub/model_execution_api.py
      ui_spec: validation/ui/adapters/inesdata/specs/12-ai-model-execution.spec.ts
      ui_evidence_case: DS-UI-AMH-EXEC-01
      external_ui_spec: validation/ui/adapters/inesdata/specs/15-ai-model-external-execution.spec.ts
      external_ui_evidence_case: DS-UI-AMH-EXEC-02
      latest_inesdata_ui_evidence: experiments/ai-model-hub-inesdata-ui-marked-20260506/components/ai-model-hub/inesdata-ui/results.json
      latest_dashboard: experiments/ai-model-hub-inesdata-ui-marked-20260506/framework-report/index.html
      visual_markers: PLAYWRIGHT_INTERACTION_MARKERS=1
      notes: The runner creates a temporary HttpData asset, calls /management/v3/modelexecutions/execute and deletes the asset after execution as the A5.2 controlled baseline. The local UI spec creates a run-scoped machineLearning HttpData asset pointing to adapters/inesdata/sources/model-server, checks input validation errors, and validates visible execution output/history from AI Model Execution. The external UI spec validates that the consumer sees and executes the model only after a contract agreement exists.

  - id: PT5-MH-11
    component: ai_model_hub
    case_group: pt5
    description: Contracting and execution
    type: api
    validation_type: integration
    dataspace_dimension: execution
    execution_mode: api
    coverage_status: automated
    mapping_status: mapped
    preconditions:
      - Active agreements exist for consumable models
    steps:
      - List current agreements
      - Select an active agreement to operate on the model
    expected_result: Only active agreements are available
    traceability:
      - MH-36
    automation:
      status: automated
      mode: api
      runner: validation/components/ai_model_hub/connector_governance_api.py
      evidence_case: PT5-MH-11
      enable_with: AI_MODEL_HUB_ENABLE_CONNECTOR_GOVERNANCE=1
      notes: The runner lists contract agreements after negotiation and selects the agreement linked to the temporary model asset.

  - id: PT5-MH-12
    component: ai_model_hub
    case_group: pt5
    description: Model comparison
    type: ui
    validation_type: functional
    dataspace_dimension: comparison
    execution_mode: api_fixture_ui_ready
    coverage_status: automated
    mapping_status: mapped
    preconditions:
      - Multiple comparable models exist
      - The comparison module is accessible
    steps:
      - Select multiple models
      - Validate the generated benchmark input for the selected models
      - Download a suggested benchmark dataset generated from the selected model metadata
      - Confirm that they are prepared for comparison
    expected_result: Models are selected correctly, the generated benchmark input is accepted and a suggested dataset is available
    traceability:
      - MH-37
    automation:
      status: automated
      mode: api_fixture
      runner: validation/components/ai_model_hub/model_benchmarking_api.py
      ui_spec: validation/components/ai_model_hub/ui/specs/pt5_mh_12_15_model_benchmarking_demo.spec.js
      inesdata_ui_spec: validation/ui/adapters/inesdata/specs/13-ai-model-benchmarking.spec.ts
      inesdata_ui_evidence_case: DS-UI-AMH-BENCH-01
      evidence_case: PT5-MH-12
      enable_with: AI_MODEL_HUB_ENABLE_MODEL_BENCHMARKING=1
      ui_demo_enable_with: AI_MODEL_HUB_ENABLE_BENCHMARKING_UI_DEMO=1
      latest_ui_evidence: experiments/ai-model-hub-benchmarking-ui-marked-20260506/components/ai-model-hub/ui/results.json
      visual_markers: PLAYWRIGHT_INTERACTION_MARKERS=1
      notes: The runner selects two controlled FLARES compatible model assets and records the benchmark-ready dataset mapping. The Playwright UI demo reuses the same fixture and controlled infer route without touching AIModelHub sources. INESData UI integration is covered by DS-UI-AMH-BENCH-01 using two deterministic model-server endpoints; it validates the generated benchmark input and downloads a suggested CSV dataset before uploading the small validation CSV.

  - id: PT5-MH-13
    component: ai_model_hub
    case_group: pt5
    description: Model comparison
    type: api
    validation_type: functional
    dataspace_dimension: comparison
    execution_mode: api_fixture
    coverage_status: automated
    mapping_status: mapped
    preconditions:
      - Multiple comparable and executable models exist
      - The same input can be sent to all of them
    steps:
      - Execute multiple models with the same input
      - Obtain preliminary outputs for every selected model before ranking
      - Collect comparison responses
    expected_result: Executions are comparable and preliminary outputs are available for every selected model
    traceability:
      - MH-38
    automation:
      status: automated
      mode: api_fixture
      runner: validation/components/ai_model_hub/model_benchmarking_api.py
      ui_spec: validation/components/ai_model_hub/ui/specs/pt5_mh_12_15_model_benchmarking_demo.spec.js
      inesdata_ui_spec: validation/ui/adapters/inesdata/specs/13-ai-model-benchmarking.spec.ts
      inesdata_ui_evidence_case: DS-UI-AMH-BENCH-01
      evidence_case: PT5-MH-13
      enable_with: AI_MODEL_HUB_ENABLE_MODEL_BENCHMARKING=1
      ui_demo_enable_with: AI_MODEL_HUB_ENABLE_BENCHMARKING_UI_DEMO=1
      latest_ui_evidence: experiments/ai-model-hub-benchmarking-ui-marked-20260506/components/ai-model-hub/ui/results.json
      visual_markers: PLAYWRIGHT_INTERACTION_MARKERS=1
      notes: The runner executes both controlled models over the same FLARES input fingerprints and stores per-model execution evidence. The Playwright demo clicks Run Benchmark and shows those executions in the UI. INESData UI integration is covered by DS-UI-AMH-BENCH-01 using two deterministic model-server endpoints; it obtains visible preliminary outputs for both models before running the dataset benchmark.

  - id: PT5-MH-14
    component: ai_model_hub
    case_group: pt5
    description: Model comparison
    type: api
    validation_type: functional
    dataspace_dimension: comparison
    execution_mode: api_fixture
    coverage_status: automated
    mapping_status: mapped
    preconditions:
      - The comparison module produces aggregated metrics
    steps:
      - Upload the controlled validation dataset
      - Collect and calculate comparison metrics
      - Review the coherence of the resulting values
    expected_result: Metrics are coherent with the task
    traceability:
      - MH-39
    automation:
      status: automated
      mode: api_fixture
      runner: validation/components/ai_model_hub/model_benchmarking_api.py
      ui_spec: validation/components/ai_model_hub/ui/specs/pt5_mh_12_15_model_benchmarking_demo.spec.js
      inesdata_ui_spec: validation/ui/adapters/inesdata/specs/13-ai-model-benchmarking.spec.ts
      inesdata_ui_evidence_case: DS-UI-AMH-BENCH-01
      evidence_case: PT5-MH-14
      enable_with: AI_MODEL_HUB_ENABLE_MODEL_BENCHMARKING=1
      ui_demo_enable_with: AI_MODEL_HUB_ENABLE_BENCHMARKING_UI_DEMO=1
      latest_ui_evidence: experiments/ai-model-hub-benchmarking-ui-marked-20260506/components/ai-model-hub/ui/results.json
      visual_markers: PLAYWRIGHT_INTERACTION_MARKERS=1
      notes: The runner calculates accuracy, success rate, latency, throughput and score, then validates ranking coherence. The Playwright demo asserts that the UI renders the metrics columns. INESData UI integration is covered by DS-UI-AMH-BENCH-01 using two deterministic model-server endpoints and a small validation CSV after input validation and output preparation.

  - id: PT5-MH-15
    component: ai_model_hub
    case_group: pt5
    description: Model comparison
    type: ui
    validation_type: functional
    dataspace_dimension: comparison
    execution_mode: api_fixture_ui_ready
    coverage_status: automated
    mapping_status: mapped
    preconditions:
      - Comparison metrics have already been calculated
    steps:
      - Display comparison tables and charts
      - Show the ranking summary and benchmark evidence entry point
      - Export the ranking results as CSV
      - Open Observer benchmark evidence for the generated benchmarkRunId when available
      - Review the resulting visualization
    expected_result: Comparative results, ranking summary, exported CSV and Observer benchmark evidence entry point are available
    traceability:
      - MH-40
      - MH-41
      - MH-42
    automation:
      status: automated
      mode: api_fixture_ui_ready
      runner: validation/components/ai_model_hub/model_benchmarking_api.py
      ui_spec: validation/components/ai_model_hub/ui/specs/pt5_mh_12_15_model_benchmarking_demo.spec.js
      inesdata_ui_spec: validation/ui/adapters/inesdata/specs/13-ai-model-benchmarking.spec.ts
      inesdata_ui_evidence_case: DS-UI-AMH-BENCH-01
      evidence_case: PT5-MH-15
      enable_with: AI_MODEL_HUB_ENABLE_MODEL_BENCHMARKING=1
      ui_demo_enable_with: AI_MODEL_HUB_ENABLE_BENCHMARKING_UI_DEMO=1
      latest_ui_evidence: experiments/ai-model-hub-benchmarking-ui-marked-20260506/components/ai-model-hub/ui/results.json
      visual_markers: PLAYWRIGHT_INTERACTION_MARKERS=1
    notes: The runner produces renderable table rows and chart series for the comparison dashboard. The Playwright demo validates the visible table and best-model summary for auditors. INESData UI integration is covered by DS-UI-AMH-BENCH-01 using two deterministic model-server endpoints, the visible ranking summary, the exported ranking CSV and the generated benchmarkRunId Observer evidence route.

  - id: PT5-MH-16
    component: ai_model_hub
    case_group: pt5
    description: Security and identity
    type: api
    validation_type: integration
    dataspace_dimension: identity
    execution_mode: api
    coverage_status: automated
    mapping_status: mapped
    preconditions:
      - A working OIDC/OAuth2 integration exists in the final environment
    steps:
      - Access the API with OIDC
      - Validate access control and authorization
    expected_result: Access is authenticated correctly
    traceability:
      - MH-45
    notes: Automated through the connector OIDC flow used by the current INESData deployment; tokens and Bearer headers are intentionally excluded from evidence.
    automation:
      status: automated
      mode: api
      runner: validation/components/ai_model_hub/connector_governance_api.py
      evidence_case: PT5-MH-16
      enable_with: AI_MODEL_HUB_ENABLE_CONNECTOR_GOVERNANCE=1

  - id: PT5-MH-17
    component: ai_model_hub
    case_group: pt5
    description: Traceability and auditing
    type: api
    validation_type: non_functional
    dataspace_dimension: governance
    execution_mode: api
    coverage_status: automated
    mapping_status: mapped
    preconditions:
      - The system exposes verifiable operational traceability
    steps:
      - Execute relevant operations on the component
      - Review the traceability record or evidence
    expected_result: Operations are recorded
    traceability:
      - MH-46
    automation:
      status: automated
      mode: api
      runner: validation/components/ai_model_hub/connector_governance_api.py
      evidence_case: PT5-MH-17
      enable_with: AI_MODEL_HUB_ENABLE_CONNECTOR_GOVERNANCE=1
      notes: The runner writes a non-secret traceability record with operation names, HTTP statuses and created entity identifiers.

  - id: PT5-MH-18
    component: ai_model_hub
    case_group: pt5
    description: Dataspace integration
    type: api
    validation_type: integration
    dataspace_dimension: integration
    execution_mode: api
    coverage_status: automated
    mapping_status: mapped
    preconditions:
      - The component is integrated with EDC APIs and the PT5 environment connectors
    steps:
      - Consume connector APIs from the component
      - Validate the end-to-end behavior
    expected_result: Functional integration
    traceability:
      - MH-47
    automation:
      status: automated
      mode: api
      runner: validation/components/ai_model_hub/connector_governance_api.py
      evidence_case: PT5-MH-18
