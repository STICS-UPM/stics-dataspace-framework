  - id: PT5-MH-10
    component: ai_model_hub
    case_group: pt5
    description: Contracting and execution
    type: api
    validation_type: integration
    dataspace_dimension: execution
    execution_mode: api
    coverage_status: api_smoke
    mapping_status: partial
    preconditions:
      - A controlled executable model endpoint exists as HttpData
      - For remote models, the corresponding contractual agreement is active
    steps:
      - Create a temporary HttpData asset for the executable endpoint
      - Execute inference through /management/v3/modelexecutions/execute
      - Validate the model response
      - Delete the temporary asset
    expected_result: Response conforms to the model contract
    traceability:
      - MH-34
      - MH-35
    notes: A connector-side API smoke is available for controlled HttpData model endpoints; the full FLARES functional inference path remains pending.
    automation:
      status: automated
      mode: api
      runner: validation/components/ai_model_hub/model_execution_api.py
      latest_inesdata_ui_evidence: experiments/ai-model-hub-inesdata-ui-marked-20260506/components/ai-model-hub/inesdata-ui/results.json
      latest_dashboard: experiments/ai-model-hub-inesdata-ui-marked-20260506/framework-report/index.html
      visual_markers: PLAYWRIGHT_INTERACTION_MARKERS=1
      notes: The runner creates a temporary HttpData asset, calls /management/v3/modelexecutions/execute and deletes the asset after execution.

