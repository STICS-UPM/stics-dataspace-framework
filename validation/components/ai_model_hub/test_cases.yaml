support_checks:
  - id: MH-BOOTSTRAP-01
    component: ai_model_hub
    case_group: support
    description: Dashboard shell availability
    type: api
    validation_type: support
    dataspace_dimension: support
    execution_mode: api_support
    coverage_status: automated
    mapping_status: supporting
    preconditions:
      - AI Model Hub base URL is known
      - The dashboard is deployed and reachable
    steps:
      - Open the dashboard base URL
      - Confirm that the application shell is returned
    expected_result: The dashboard shell is served successfully
    automation:
      status: automated
      mode: api_support
      runner_case: mh_bootstrap_01_shell
      real_flow:
        method: GET
        path: /
      notes: Bootstrap support check used before PT5 UI automation is enabled.

  - id: MH-BOOTSTRAP-02
    component: ai_model_hub
    case_group: support
    description: Runtime application configuration availability
    type: api
    validation_type: support
    dataspace_dimension: support
    execution_mode: api_support
    coverage_status: automated
    mapping_status: supporting
    preconditions:
      - AI Model Hub base URL is known
      - The dashboard serves runtime configuration files
    steps:
      - Request the runtime application configuration
      - Confirm that the payload exposes dashboard metadata
    expected_result: Runtime configuration is available and usable
    automation:
      status: automated
      mode: api_support
      runner_case: mh_bootstrap_02_runtime_config
      real_flow:
        method: GET
        path: /config/app-config.json
      notes: Bootstrap support check used to confirm that runtime configuration is wired before UI flows are automated.

test_cases:
  - id: PT5-MH-01
    component: ai_model_hub
    case_group: pt5
    description: Access to the model catalog
    type: ui
    validation_type: functional
    dataspace_dimension: access
    execution_mode: ui
    coverage_status: automated_partial_ui
    mapping_status: partial
    preconditions:
      - AI Model Hub is deployed and reachable
      - At least one valid connector or catalog context configuration exists
    steps:
      - Access the catalog from the component UI
      - Confirm that the main catalog view becomes operational
    expected_result: The catalog loads correctly
    traceability:
      - MH-01
    notes: Automated UI validation slice for QA evidence. It validates component access and catalog shell readiness; deeper catalog semantics remain covered by integration and governance flows.
    automation:
      status: automated
      mode: ui_partial
      ui_spec: validation/components/ai_model_hub/ui/specs/pt5_mh_01_catalog_access.spec.js
      notes: The current Playwright slice verifies that the catalog route and its primary request surface render correctly.

  - id: PT5-MH-02
    component: ai_model_hub
    case_group: pt5
    description: Model publication
    type: ui
    validation_type: functional
    dataspace_dimension: publication
    execution_mode: ui
    coverage_status: automated_partial_ui
    mapping_status: partial
    preconditions:
      - A provider user with adequate permissions is available
      - The model creation form is accessible
    steps:
      - Register a model with valid metadata
      - Save the model in local state
    expected_result: The model is created in local state
    traceability:
      - MH-04
      - MH-05
      - MH-06
      - MH-07
      - MH-08
      - MH-09
      - MH-10
      - MH-11
      - MH-12
      - MH-13
    notes: Automated UI validation slice for local model registration. It validates component-side publication behavior; federated publication is tracked separately in PT5-MH-03.
    automation:
      status: automated
      mode: ui_partial
      ui_spec: validation/components/ai_model_hub/ui/specs/pt5_mh_02_model_registration.spec.js
      notes: The first Playwright slice covers provider-side local asset creation with valid metadata and validation of the resulting asset card.

  - id: PT5-MH-03
    component: ai_model_hub
    case_group: pt5
    description: Model publication
    type: ui
    validation_type: integration
    dataspace_dimension: publication
    execution_mode: api_ui
    coverage_status: automated
    mapping_status: mapped
    preconditions:
      - A local model has already been registered
      - The connector federated catalog is available
    steps:
      - Publish the model into the federated catalog
      - Check the external visibility of the model
    expected_result: The model is externally visible
    traceability:
      - MH-14
      - MH-15
    notes: Automated integration flow validating alignment between the component UI and connector APIs. It has INESData evidence with visual markers.
    automation:
      status: automated
      mode: api_ui
      ui_spec: validation/components/ai_model_hub/ui/specs/pt5_mh_03_catalog_publication.spec.js
      latest_inesdata_ui_evidence: experiments/ai-model-hub-inesdata-ui-marked-20260506/components/ai-model-hub/inesdata-ui/results.json
      latest_dashboard: experiments/ai-model-hub-inesdata-ui-marked-20260506/framework-report/index.html
      visual_markers: PLAYWRIGHT_INTERACTION_MARKERS=1
      notes: The first automation slice bootstraps a provider-side published asset via management API and verifies external visibility from the consumer catalog UI.

