observer_cases:
  - id: MH-OBS-01
    component: ai_model_hub
    case_group: observer
    description: AI Model Observer home and navigation smoke
    type: ui
    validation_type: non_functional
    dataspace_dimension: governance
    execution_mode: ui
    coverage_status: automated
    mapping_status: planned_observer
    preconditions:
      - AI Model Observer UI is integrated in INESData
      - INESData login credentials are available
    steps:
      - Sign in to the INESData connector interface
      - Open AI Model Observer
      - Verify the Asset timeline, Agreement evidence, Benchmark evidence and Participant summary cards
      - Enter controlled identifiers and confirm navigation to Observer routes
    expected_result: The Observer UI loads and exposes the main evidence navigation surfaces
    traceability:
      - PT5-MH-17
      - Model Clearing House
    automation:
      status: automated
      mode: ui
      ui_spec: validation/ui/adapters/inesdata/specs/10-ai-model-observer.spec.ts
      evidence_case: MH-OBS-01
      enable_with: UI_AI_MODEL_OBSERVER_DEMO=1
      visual_markers: PLAYWRIGHT_INTERACTION_MARKERS=1
      notes: Read-only audit-ready smoke. The spec skips safely when the Observer UI is not integrated yet.

  - id: MH-OBS-02
    component: ai_model_hub
    case_group: observer
    description: Model Observer journal API records and exposes controlled evidence events
    type: api
    validation_type: non_functional
    dataspace_dimension: governance
    execution_mode: api
    coverage_status: automated
    mapping_status: planned_observer
    preconditions:
      - Model Observer backend API is integrated and reachable
      - A controlled QA event batch can be written without storing sensitive payloads
    steps:
      - POST a controlled event batch to /api/model-observer/events/bulk
      - GET /api/model-observer/timeline/:assetId
      - GET /api/model-observer/agreements/:agreementId
      - GET /api/model-observer/benchmarks/:benchmarkRunId
      - GET /api/model-observer/participants/:participantId/summary
      - Verify that evidence contains metadata, hashes and counters instead of raw datasets or secrets
    expected_result: Controlled Observer evidence is stored and queryable by asset, agreement, benchmark and participant
    traceability:
      - PT5-MH-17
      - MH-46
      - Model Clearing House
    automation:
      status: automated
      mode: api
      runner: validation/components/ai_model_hub/model_observer_api.py
      evidence_case: MH-OBS-02
      enable_with: AI_MODEL_HUB_ENABLE_MODEL_OBSERVER=1
      configure_with: AI_MODEL_HUB_OBSERVER_API_BASE_URL=http://backend-demo.dev.ds.dataspaceunit.upm
      suite_test: tests/test_ai_model_hub_model_observer_api.py
      notes: The runner skips safely when the Observer API is not integrated yet, so Level 6 remains stable by default.

  - id: MH-OBS-03
    component: ai_model_hub
    case_group: observer
    description: AI Model Browser leaves discoverability or detail evidence in Observer
    type: ui_api
    validation_type: integration
    dataspace_dimension: governance
    execution_mode: ui_api
    coverage_status: planned
    mapping_status: planned_observer
    preconditions:
      - AI Model Browser exposes at least one controlled model
      - Observer timeline can be queried by assetId
    steps:
      - Open AI Model Browser
      - Search or open a controlled model detail view
      - Open the Observer timeline for that asset
      - Verify MODEL_DETAIL_VIEWED or equivalent evidence
    expected_result: Browser activity is visible as Observer evidence for the selected model asset
    traceability:
      - PT5-MH-07
      - PT5-MH-17
    automation:
      status: planned
      mode: ui_api
      suggested_spec: validation/components/ai_model_hub/ui/specs/mh_obs_03_browser_observer.spec.js
      enable_with: AI_MODEL_HUB_ENABLE_MODEL_OBSERVER_UI=1
      notes: Planned after Browser-to-Observer event emission is integrated.

  - id: MH-OBS-04
    component: ai_model_hub
    case_group: observer
    description: AI Model Execution leaves execution evidence in Observer
    type: api
    validation_type: integration
    dataspace_dimension: governance
    execution_mode: api
    coverage_status: planned
    mapping_status: planned_observer
    preconditions:
      - A controlled model execution flow is available
