      runtime_sample: derived during validation from validation/datasets/sources/gtfs-bench
      latest_evidence: experiments/semantic-virtualization-gtfs-bench-official-dataset-20260507/components/semantic-virtualization/gtfs-bench-official-dataset/semantic_virtualization_gtfs_bench_official_dataset.json

  - id: SV-GTFS-BENCH-03
