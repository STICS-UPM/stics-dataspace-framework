support_checks:
  - id: SV-BOOTSTRAP-01
    scope: semantic_virtualization
    case_group: support
    description: Semantic Virtualization service root is reachable
    type: api
    validation_type: support
    dataspace_dimension: support
    execution_mode: api_support
    coverage_status: automated
    mapping_status: supporting
    expected_result: The service root responds successfully
    automation:
      status: automated
      mode: api_support
      runner: validation/components/semantic_virtualization/runner.py

  - id: SV-GTFS-BENCH-01
    scope: semantic_virtualization
    case_group: support
    description: Validate local availability of official GTFS-Madrid-Bench resources
    type: support
    validation_type: support
    dataspace_dimension: official_dataset_traceability
    execution_mode: offline_source_readiness
    coverage_status: automated
    mapping_status: mapped
    expected_result: The framework can trace Semantic Virtualization validation to the official GTFS-Madrid-Bench repository resources before running heavier generated datasets
    automation:
      status: automated
      mode: offline_source_readiness
      runner: validation/components/semantic_virtualization/gtfs_bench_official.py
      evidence_case: SV-GTFS-BENCH-01
      source_repository: https://github.com/oeg-upm/gtfs-bench
      local_source_dir: validation/datasets/sources/gtfs-bench
      level5_sync: automatic when semantic-virtualization or ai-model-hub is configured
      optional_auto_clone: python3 validation/components/semantic_virtualization/gtfs_bench_official.py --auto-clone
      latest_evidence: experiments/semantic-virtualization-gtfs-bench-official-source-20260507/components/semantic-virtualization/gtfs-bench-official-source/semantic_virtualization_gtfs_bench_official_source.json

  - id: SV-GTFS-BENCH-02
    scope: semantic_virtualization
    case_group: support
    description: Validate a runtime sample derived from official GTFS-Madrid-Bench resources
    type: support
    validation_type: support
    dataspace_dimension: official_dataset_traceability
    execution_mode: offline_source_sample
    coverage_status: automated
    mapping_status: mapped
    expected_result: The framework derives a reproducible GTFS-Bench runtime sample from official resources without versioning a reduced dataset fixture
    automation:
      status: automated
