source_documents:
  - Official PT5 cases normalized for Ontology Hub
  - Current Level 6 integration runner surface
  - E5.2-oriented methodological adjustments over the current framework baseline

test_cases:
  - id: PT5-OH-08
    component: ontology_hub
    case_group: pt5
    description: Búsqueda de vocabularios por texto libre con contenido real indexado
    type: api
    validation_type: functional
    dataspace_dimension: discovery
    execution_mode: api
    coverage_status: automated
    mapping_status: mapped
    preconditions:
      - Ontology Hub está desplegado y accesible.
      - La API de búsqueda pública está disponible.
      - La semilla de validación contiene el vocabulario esperado.
    steps:
      - Ejecutar una búsqueda por texto libre sobre la API pública.
      - Validar que la respuesta contiene resultados coherentes con la consulta.
    expected_result: La búsqueda devuelve resultados reales y coherentes con el vocabulario sembrado.
    traceability:
      - OntHub-33
    automation:
      status: automated
      mode: api
      runner_case: pt5_oh_08_term_search
      real_flow:
        method: GET
        path: /dataset/api/v2/term/search
        query:
          q: Person
          type: class
      seeded_fixture_dependency:
        required: true
        vocabulary_prefix: saref4grid
        tag: Services

  - id: PT5-OH-09
    component: ontology_hub
    case_group: pt5
    description: Filtrado de vocabularios mediante vocabulario y etiqueta
    type: api
    validation_type: functional
    dataspace_dimension: discovery
    execution_mode: api_equivalent
    coverage_status: partial
    mapping_status: partial
    preconditions:
      - La API de búsqueda pública está disponible.
      - El vocabulario sembrado expone metadatos consultables.
    steps:
      - Ejecutar una búsqueda filtrada por vocabulario y etiqueta.
      - Validar que la respuesta conserva coherencia con los filtros aplicados.
    expected_result: La búsqueda filtrada devuelve resultados coherentes con el vocabulario y la etiqueta de ejemplo.
    traceability:
      - OntHub-34
      - OntHub-35
    automation:
      status: automated
      mode: api_equivalent
      runner_case: pt5_oh_09_filtered_search
      real_flow:
        method: GET
        path: /dataset/api/v2/term/search
        query:
          q: Person
          type: class
          vocab: saref4grid
          tag: Services
      notes: La evidencia principal de UI se cubre en la suite funcional OH-APP; esta suite conserva el equivalente API técnico para integración.

  - id: PT5-OH-13
    component: ontology_hub
    case_group: pt5
    description: Consulta SPARQL real sobre el recurso RDF de ejemplo sembrado
    type: api
    validation_type: interoperability
    dataspace_dimension: interoperability
    execution_mode: api
    coverage_status: automated
    mapping_status: mapped
    preconditions:
      - Ontology Hub está desplegado en Kubernetes.
      - El endpoint SPARQL interno del componente está disponible dentro del clúster.
      - El endpoint SPARQL público por ingress está publicado como superficie diagnóstica.
      - La ontología sembrada está cargada en el almacén RDF.
    steps:
      - Ejecutar una consulta SPARQL `ASK` sobre el recurso RDF esperado desde dentro del clúster.
      - Ejecutar la misma consulta SPARQL por el endpoint público.
      - Validar como criterio principal que la consulta interna devuelve HTTP 200 y `boolean=true`.
      - Registrar la respuesta pública por ingress como evidencia diagnóstica de exposición.
    expected_result: La consulta SPARQL interna devuelve un resultado válido sobre la ontología sembrada; la exposición pública queda trazada en el artefacto del caso.
    traceability:
      - OntHub-26
    automation:
      status: automated
      mode: api
      runner_case: pt5_oh_13_sparql_access
      real_flow:
        method: GET
        path: /dataset/sparql
        query:
          query: ASK { GRAPH ?g { <https://saref.etsi.org/saref4grid/v2.1.1/> ?p ?o } }
      runtime_env:
        ONTOLOGY_HUB_EXPECTED_SPARQL_RESOURCE_URI: https://saref.etsi.org/saref4grid/v2.1.1/
        ONTOLOGY_HUB_PREPARE_SPARQL_STORE: "true"
      evidence:
        - internal_cluster
        - public_ingress

  - id: PT5-OH-14
    component: ontology_hub
    case_group: pt5
    description: Acceso al servicio ontológico de patrones
    type: api
    validation_type: integration
    dataspace_dimension: services
    execution_mode: api
    coverage_status: partial
    mapping_status: partial
    preconditions:
      - Los servicios ontológicos están desplegados.
      - La ruta pública de patrones está publicada.
    steps:
      - Acceder a la página pública del servicio de patrones con el vocabulario de ejemplo.
      - Validar que la página no renderiza un error de servidor.
    expected_result: La página del servicio de patrones está publicada y accesible.
    traceability:
      - OntHub-52
      - OntHub-53
    automation:
      status: automated
      mode: api
      runner_case: pt5_oh_14_patterns_access
      real_flow:
        method: GET
        path: /dataset/patterns
        query:
          q: saref4grid
      known_component_issue_cases:
        - OH-APP-22
      notes: La generación funcional del ZIP se cubre en OH-APP-22; esta suite mantiene el acceso técnico al servicio.

  - id: PT5-OH-15
    component: ontology_hub
    case_group: pt5
    description: Acceso coordinado a UI pública y documentación API
    type: api
    validation_type: integration
    dataspace_dimension: integration
    execution_mode: api
    coverage_status: partial
    mapping_status: partial
    preconditions:
      - La UI pública de Ontology Hub está publicada.
      - La documentación API está publicada.
    steps:
      - Acceder a la UI pública.
      - Acceder a la documentación API.
      - Validar que ambas superficies responden sin errores de servidor.
    expected_result: La UI pública y la documentación API están disponibles de forma coordinada.
    traceability:
      - OntHub-54
      - OntHub-55
    automation:
      status: automated
      mode: api
      runner_case: pt5_oh_15_ui_api_access
      real_flow:
        requests:
          - method: GET
            path: /dataset
          - method: GET
            path: /dataset/api
      notes: La navegación UI completa se cubre en la suite funcional OH-APP-00/OH-APP-01; esta suite conserva el check HTTP/API técnico.
