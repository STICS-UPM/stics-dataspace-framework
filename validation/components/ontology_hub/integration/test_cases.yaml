source_documents:
  - Official PT5 cases normalized for Ontology Hub
  - Current Level 6 integration runner surface
  - E5.2-oriented methodological adjustments over the current framework baseline

test_cases:
  - id: PT5-OH-08
    component: ontology_hub
    case_group: pt5
    description: Free-text vocabulary search with indexed real content
    type: api
    validation_type: functional
    dataspace_dimension: discovery
    execution_mode: api
    coverage_status: automated
    mapping_status: mapped
    preconditions:
      - Ontology Hub is deployed and accessible.
      - The public search API is available.
      - The validation seed contains the expected vocabulary.
    steps:
      - Run a free-text search against the public API.
      - Validate that the response contains results consistent with the query.
    expected_result: The search returns real results consistent with the seeded vocabulary.
    traceability:
      - OntHub-33
    automation:
      status: automated
      mode: api
      runner_case: pt5_oh_08_term_search
      real_flow:
        method: GET
        path: /dataset/api/v2/term/search
        query:
          q: Person
          type: class
      seeded_fixture_dependency:
        required: true
        vocabulary_prefix: saref4grid
        tag: Services

  - id: PT5-OH-09
    component: ontology_hub
    case_group: pt5
    description: Vocabulary filtering by vocabulary and tag
    type: api
    validation_type: functional
    dataspace_dimension: discovery
    execution_mode: composite_ui_api
    coverage_status: automated
    mapping_status: mapped
    preconditions:
      - The public search API is available.
      - The seeded vocabulary exposes searchable metadata.
    steps:
      - Run a search filtered by vocabulary and tag.
      - Validate that the response remains consistent with the applied filters.
    expected_result: The filtered search returns results consistent with the example vocabulary and tag.
    traceability:
      - OntHub-34
      - OntHub-35
    automation:
      status: automated
      mode: composite_ui_api
      runner_case: pt5_oh_09_filtered_search
      composite_evidence:
        - suite: ontology_hub_functional
          cases:
            - OH-APP-08
            - OH-APP-09
            - OH-APP-10
            - OH-APP-18
            - OH-APP-19
            - OH-APP-20
            - OH-APP-21
          role: UI evidence for search, metadata and tag management.
        - suite: ontology_hub_integration
          cases:
            - PT5-OH-09
          role: Technical API validation filtered by vocabulary and tag.
      real_flow:
        method: GET
        path: /dataset/api/v2/term/search
        query:
          q: Person
          type: class
          vocab: saref4grid
          tag: Services
      notes: Composite UI+API coverage. The functional suite provides interface evidence and this suite keeps the technical integration equivalent.

  - id: PT5-OH-13
    component: ontology_hub
    case_group: pt5
    description: Real SPARQL query against the seeded RDF example resource
    type: api
    validation_type: interoperability
    dataspace_dimension: interoperability
    execution_mode: api
    coverage_status: automated
    mapping_status: mapped
    preconditions:
      - Ontology Hub is deployed in Kubernetes.
      - The component internal SPARQL endpoint is available inside the cluster.
      - The public SPARQL endpoint through ingress is exposed as a diagnostic surface.
      - The seeded ontology is loaded in the RDF store.
    steps:
      - Run a SPARQL `ASK` query against the expected RDF resource from inside the cluster.
      - Run the same SPARQL query through the public endpoint.
      - Validate as the primary criterion that the internal query returns HTTP 200 and `boolean=true`.
      - Record the public ingress response as diagnostic exposure evidence.
    expected_result: The internal SPARQL query returns a valid result for the seeded ontology; public exposure is traced in the case artifact.
    traceability:
      - OntHub-26
    automation:
      status: automated
      mode: api
      runner_case: pt5_oh_13_sparql_access
      real_flow:
        method: GET
        path: /dataset/sparql
        query:
          query: ASK { GRAPH ?g { <https://saref.etsi.org/saref4grid/v2.1.1/> ?p ?o } }
      runtime_env:
        ONTOLOGY_HUB_EXPECTED_SPARQL_RESOURCE_URI: https://saref.etsi.org/saref4grid/v2.1.1/
        ONTOLOGY_HUB_PREPARE_SPARQL_STORE: "true"
      evidence:
        - internal_cluster
        - public_ingress

  - id: PT5-OH-14
    component: ontology_hub
    case_group: pt5
    description: Pattern ontology service access
    type: api
    validation_type: integration
    dataspace_dimension: services
    execution_mode: composite_ui_api
    coverage_status: automated
    mapping_status: mapped
    preconditions:
      - Ontology services are deployed.
      - The public patterns route is exposed.
    steps:
      - Open the public pattern service page with the example vocabulary.
      - Validate that the page does not render a server error.
    expected_result: The pattern service page is published and accessible.
    traceability:
      - OntHub-52
      - OntHub-53
    automation:
      status: automated
      mode: composite_ui_api
      runner_case: pt5_oh_14_patterns_access
      composite_evidence:
        - suite: ontology_hub_functional
          cases:
            - OH-APP-22
            - OH-APP-23
            - OH-APP-24
            - OH-APP-25
          role: UI evidence for pattern generation, FOOPS, Themis and Widoco.
        - suite: ontology_hub_integration
          cases:
            - PT5-OH-14
          role: Technical publication check for the pattern service.
      real_flow:
        method: GET
        path: /dataset/patterns
        query:
          q: saref4grid
      notes: Composite UI+API coverage. Functional ZIP generation is covered in OH-APP-22; this suite keeps the technical service access check.

  - id: PT5-OH-15
    component: ontology_hub
    case_group: pt5
    description: Coordinated access to public UI and API documentation
    type: api
    validation_type: integration
    dataspace_dimension: integration
    execution_mode: composite_ui_api
    coverage_status: automated
    mapping_status: mapped
    preconditions:
      - The public Ontology Hub UI is published.
      - API documentation is published.
    steps:
      - Open the public UI.
      - Open the API documentation.
      - Validate that both surfaces respond without server errors.
    expected_result: The public UI and API documentation are available in a coordinated way.
    traceability:
      - OntHub-54
      - OntHub-55
    automation:
      status: automated
      mode: composite_ui_api
      runner_case: pt5_oh_15_ui_api_access
      composite_evidence:
        - suite: ontology_hub_functional
          cases:
            - OH-APP-00
            - OH-APP-01
          role: UI evidence for public availability and navigation.
        - suite: ontology_hub_integration
          cases:
            - PT5-OH-15
          role: Coordinated technical check for public UI and API documentation.
      real_flow:
        requests:
          - method: GET
            path: /dataset
          - method: GET
            path: /dataset/api
      notes: Composite UI+API coverage. Complete UI navigation is covered in OH-APP-00/OH-APP-01; this suite keeps the technical HTTP/API check.
